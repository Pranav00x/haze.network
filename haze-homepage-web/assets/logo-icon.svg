<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="20%" cy="8%" r="70%">
      <stop offset="0%" stop-color="#3a3350" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1b1a20" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#3c2f1e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1b1a20" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0bb7e"/>
      <stop offset="100%" stop-color="#d99a4e"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="104" fill="#1b1a20"/>
  <rect width="512" height="512" rx="104" fill="url(#glow1)"/>
  <rect width="512" height="512" rx="104" fill="url(#glow2)"/>

  <!-- Brand mark: a left-half-filled circle (mirrors the "◖" glyph used
       as the text brand-mark across the wallet/explorer/marketplace UIs),
       rendered as a real vector shape with a soft amber fill. -->
  <g transform="translate(256 256)">
    <circle r="132" fill="none" stroke="url(#amberGrad)" stroke-width="14" opacity="0.35"/>
    <path d="M 0 -132 A 132 132 0 0 0 0 132 Z" fill="url(#amberGrad)"/>
  </g>
</svg>
