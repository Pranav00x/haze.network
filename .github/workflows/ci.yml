name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check wasm/mobile FFI surfaces stay in sync
        # Invoked via `sh` explicitly, not `./scripts/...` - the executable
        # bit doesn't survive a `git add` from a Windows dev machine
        # reliably, and this way it doesn't matter whether it's set.
        run: sh scripts/check-ffi-wasm-parity.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --release --verbose

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.0.12077973" > /dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Cross-compile the Rust core for every Android ABI
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 build --release --lib --no-default-features --features native
          mkdir -p android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86,x86_64}
          cp target/aarch64-linux-android/release/libhaze_core.so android/app/src/main/jniLibs/arm64-v8a/
          cp target/armv7-linux-androideabi/release/libhaze_core.so android/app/src/main/jniLibs/armeabi-v7a/
          cp target/i686-linux-android/release/libhaze_core.so android/app/src/main/jniLibs/x86/
          cp target/x86_64-linux-android/release/libhaze_core.so android/app/src/main/jniLibs/x86_64/

      - name: Generate Kotlin bindings from the compiled library
        run: |
          mkdir -p android/app/src/main/java
          cargo run --release --bin uniffi-bindgen -- generate \
            --library target/aarch64-linux-android/release/libhaze_core.so \
            --language kotlin \
            --out-dir android/app/src/main/java

      - name: Build Android app (debug APK)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: haze-wallet-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Sends the freshly-built debug APK straight to a Telegram chat, so a
      # successful build is immediately installable on a phone without
      # digging through Actions artifacts. TELEGRAM_BOT_TOKEN is a repo
      # secret (never printed - GitHub Actions masks it in logs
      # automatically); the chat ID isn't sensitive the same way, so it's
      # inline.
      - name: Send build to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-1004439022926"
          # Passed via env, not interpolated directly into the script, so a
          # commit message containing quotes/backticks can't break (or
          # inject into) this shell command.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          CAPTION="haze wallet build ✅ — ${GITHUB_REF_NAME} @ ${GITHUB_SHA:0:7}
          ${COMMIT_MESSAGE}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@android/app/build/outputs/apk/debug/app-debug.apk;filename=haze-wallet-debug.apk" \
            -F "caption=${CAPTION}"
