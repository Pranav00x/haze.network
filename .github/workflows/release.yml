name: Release

# Only runs on a pushed tag (e.g. v0.1.0-testnet) - this is a deliberate
# publish action, not something that should fire on every commit to main
# the way the CI workflow does.
on:
  push:
    tags:
      - "v*"

# The default GITHUB_TOKEN is read-only unless a workflow explicitly asks
# for more - without this, publish-release's softprops/action-gh-release
# step 403s ("Resource not accessible by integration") trying to create
# the release itself.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: haze

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: haze-testnet-windows-x86_64
            archive_ext: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: haze-testnet-linux-x86_64
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            # macos-13 (the last Intel-hosted runner) has multi-hour+ queue
            # times as GitHub winds down Intel Mac capacity - cross-compile
            # the Intel binary from an Apple Silicon runner instead. Works
            # out of the box: Xcode's toolchain on arm64 runners already
            # supports the x86_64-apple-darwin target, just needs `rustup
            # target add`.
            os: macos-14
            asset_name: haze-testnet-macos-x86_64
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14 # Apple Silicon runner - native build, no cross toolchain needed
            asset_name: haze-testnet-macos-aarch64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build node binary (release)
        run: cargo build --release --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Render README.txt from template
        shell: bash
        run: |
          sed "s/{{TAG}}/${{ github.ref_name }}/g" release/README.txt.tmpl > README.txt

      - name: Stage package contents (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.asset_name }}
          cp target/${{ matrix.target }}/release/${{ env.BIN_NAME }} dist/${{ matrix.asset_name }}/
          cp README.txt dist/${{ matrix.asset_name }}/

      - name: Stage package contents (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.asset_name }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe" "dist/${{ matrix.asset_name }}/"
          Copy-Item "README.txt" "dist/${{ matrix.asset_name }}/"

      - name: Create archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        working-directory: dist
        run: tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}

      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        working-directory: dist
        run: Compress-Archive -Path "${{ matrix.asset_name }}" -DestinationPath "${{ matrix.asset_name }}.zip"

      - name: Generate SHA-256 checksum
        shell: bash
        working-directory: dist
        run: |
          ARCHIVE="${{ matrix.asset_name }}.${{ matrix.archive_ext }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile "$ARCHIVE" SHA256 | sed -n '2p' | tr -d ' \r' > "$ARCHIVE.sha256.tmp"
            echo "$(cat "$ARCHIVE.sha256.tmp")  $ARCHIVE" > "$ARCHIVE.sha256"
            rm "$ARCHIVE.sha256.tmp"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}
            dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}.sha256

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.0.12077973" > /dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Cross-compile the Rust core for every Android ABI
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 build --release --lib --no-default-features --features native
          mkdir -p android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86,x86_64}
          cp target/aarch64-linux-android/release/libhaze_core.so android/app/src/main/jniLibs/arm64-v8a/
          cp target/armv7-linux-androideabi/release/libhaze_core.so android/app/src/main/jniLibs/armeabi-v7a/
          cp target/i686-linux-android/release/libhaze_core.so android/app/src/main/jniLibs/x86/
          cp target/x86_64-linux-android/release/libhaze_core.so android/app/src/main/jniLibs/x86_64/

      - name: Generate Kotlin bindings from the compiled library
        run: |
          mkdir -p android/app/src/main/java
          cargo run --release --bin uniffi-bindgen -- generate \
            --library target/aarch64-linux-android/release/libhaze_core.so \
            --language kotlin \
            --out-dir android/app/src/main/java

      # No release-signing keystore is configured yet, so this ships as a
      # debug-signed APK - same tradeoff CI already accepts for its own
      # (never-published) debug build. Fine for testnet: installable via
      # "unknown sources" on any Android device, just not distributable
      # through the Play Store. Set up a real signing key (and store it as
      # a GitHub Actions secret, never in this repo) before a real launch.
      - name: Build Android app (debug APK)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Stage and checksum the APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/haze-testnet-android.apk
          cd dist && shasum -a 256 haze-testnet-android.apk > haze-testnet-android.apk.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: haze-testnet-android
          path: |
            dist/haze-testnet-android.apk
            dist/haze-testnet-android.apk.sha256

  publish-release:
    needs: [build, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Haze testnet ${{ github.ref_name }}"
          body: |
            Public testnet build of the Haze node binary for Windows, macOS (Intel + Apple Silicon), and Linux, plus an Android wallet APK.

            **This is testnet software.** See the included README.txt (desktop archives) before running - HAZE has no value, and the chain may still be reset if a serious bug is found.

            The Android APK is debug-signed (no release keystore set up yet) - install it via "unknown sources," it isn't on the Play Store.

            Each archive/APK includes a `.sha256` checksum file - verify your download before running it.
          files: artifacts/**
          fail_on_unmatched_files: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
