[package]
name = "haze"
version = "0.1.0"
edition = "2024"

[dependencies]
curve25519-dalek-ng = { version = "4.1.1", features = ["serde"] }
bulletproofs = "4.0.0"
rand = "0.8"
merlin = "3.0.0"
sha2 = "0.10.8"
tokio = { version = "1.52.3", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3.3"
clap = { version = "4.6.1", features = ["derive"] }
