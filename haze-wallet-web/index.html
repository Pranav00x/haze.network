      messageEl.innerHTML = `<div class="message error">Enter both an asset ID and the new owner's pubkey.</div>`;
      return;
    }

    try {
      const opJson = build_transfer_asset_request(sessionKeystoreBytes, assetId, newOwnerHex, undefined, undefined);

      const res = await fetch(API_BASE + "/v1/assets/transfer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: opJson,
      });

      if (!res.ok) {
        const errJson = await res.json().catch(() => ({}));
        messageEl.innerHTML = `<div class="message error">Node rejected transfer: ${errJson.error || res.status}</div>`;
        return;
      }

      messageEl.innerHTML = `<div class="message success">Queued transfer of "${assetId}" - waiting for it to be mined&hellip;</div>`;
      document.getElementById("transfer-asset-input").value = "";
      document.getElementById("transfer-asset-new-owner-input").value = "";

      pollForAssetConfirmation(assetId, () => {
        messageEl.innerHTML = `<div class="message success">"${assetId}" transfer complete.</div>`;
        pushActivity({ type: "asset_transferred", title: `Transferred ${assetId}`, detail: `to ${newOwnerHex}` });
      }, { isConfirmed: (record) => bytesToHex(record.owner_pubkey) === newOwnerHex.toLowerCase() });
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  // Metadata is stored on-chain as raw bytes (core::assets::AssetRecord) -
  // interpreted as UTF-8, and rendered as a real title/image preview if it
  // happens to parse as JSON with that shape (a UI convention, not something
  // consensus enforces - see the asset module's own doc comment). Mirrors
  // nft-marketplace/index.html's decodeAssetMetadata exactly.
  function decodeAssetMetadata(bytes) {
    try {
      const text = new TextDecoder("utf-8", { fatal: false }).decode(new Uint8Array(bytes));
      try {
        const parsed = JSON.parse(text);
        if (parsed && typeof parsed === "object") return { title: parsed.title, image: parsed.image, raw: text };
      } catch (_) { /* not JSON */ }
      return { raw: text };
    } catch (_) {
      return { raw: "" };
    }
  }

  document.getElementById("find-my-assets-btn").addEventListener("click", async () => {
    const resultEl = document.getElementById("find-my-assets-result");
    resultEl.innerHTML = `<div class="message">Searching&hellip;</div>`;
    try {
      const pubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
      const records = await fetchJson("/v1/assets?owner=" + encodeURIComponent(pubkeyHex) + "&limit=500");
      if (records.length === 0) {
        resultEl.innerHTML = `<div class="message">No assets found for your identity pubkey.</div>`;
        return;
      }
      const grid = document.createElement("div");
      grid.className = "asset-grid";
      for (const r of records) {
        const meta = decodeAssetMetadata(r.metadata);
        const card = document.createElement("div");
        card.className = "asset-card";
        const image = meta.image ? `<img class="asset-card-image" src="${meta.image}" alt="" onerror="this.style.display='none'">` : "";
        card.innerHTML = `${image}<div class="asset-card-title">${meta.title || r.asset_id}</div><div class="asset-card-id">${r.asset_id}</div>`;
        grid.appendChild(card);
      }
      resultEl.innerHTML = "";
      resultEl.appendChild(grid);
    } catch (e) {
      resultEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  // Requests funds from the node's own repeatable faucet (see src/api/faucet.rs)
  // - unlike the old single-use claim-genesis output, this can be used as many
  // times as needed, capped per request server-side. Runs the same two-party
  // slate protocol as a normal peer payment, just fully automated: the node
  // plays sender, this wallet plays receiver, both steps happen in one click.
  document.getElementById("faucet-btn").addEventListener("click", async () => {
    const messageEl = document.getElementById("dash-message");
    const btn = document.getElementById("faucet-btn");
    btn.disabled = true;
    messageEl.innerHTML = `<div class="message success">Requesting devnet funds&hellip;</div>`;

    try {
      const FAUCET_AMOUNT = 500n;
      const reqRes = await fetch(API_BASE + "/v1/faucet", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount: Number(FAUCET_AMOUNT) }),
      });
      const reqJson = await reqRes.json();
      if (!reqRes.ok) {
        messageEl.innerHTML = `<div class="message error">Faucet unavailable: ${reqJson.error || reqRes.status}</div>`;
        return;
      }

      const responded = respond_to_slate(sessionKeystoreBytes, reqJson.slate_json);
      sessionKeystoreBytes = responded.updated_keystore_bytes;
      let storeBytes = loadWalletStoreBytes();
      storeBytes = commit_receive(storeBytes, responded.receiver_output);
      saveWalletStoreBytes(storeBytes);

      const completeRes = await fetch(API_BASE + "/v1/faucet/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ response_slate_json: responded.response_slate_json }),
      });
      const completeJson = await completeRes.json();
      if (!completeRes.ok) {
        messageEl.innerHTML = `<div class="message error">Faucet failed to broadcast: ${completeJson.error || completeRes.status}</div>`;
        return;
      }

      messageEl.innerHTML = `<div class="message success">Received ${FAUCET_AMOUNT}. Refreshing balance&hellip;</div>`;
      pushActivity({ type: "faucet", title: `Received ${FAUCET_AMOUNT} from devnet faucet` });
      await refreshBalance();
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById("lock-btn").addEventListener("click", () => {
    sessionKeystoreBytes = null;
    renderMyNameBadge(null);
    renderLockScreen();
  });

  document.getElementById("send-btn").addEventListener("click", async () => {
    const amountInput = document.getElementById("send-amount");
    const amount = BigInt(amountInput.value || "0");
    const messageEl = document.getElementById("send-message");
    if (amount <= 0n) {
      messageEl.innerHTML = `<div class="message error">Enter an amount.</div>`;
      return;
    }

    try {
      const storeBytes = loadWalletStoreBytes();
      const fee = await getSuggestedFee();
      const plan = plan_send(sessionKeystoreBytes, storeBytes, amount, fee);

      const res = await fetch(API_BASE + "/v1/transactions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: plan.transaction_json,
      });

      if (!res.ok) {
        const text = await res.text();
        messageEl.innerHTML = `<div class="message error">Node rejected transaction: ${text}</div>`;
        return;
      }

      sessionKeystoreBytes = plan.updated_keystore_bytes;
      const updatedStoreBytes = commit_send(storeBytes, plan.spent_commitments_hex, plan.dest, plan.change);
      saveWalletStoreBytes(updatedStoreBytes);

      const link = explorerLinkForTx(plan.transaction_json);
      messageEl.innerHTML = `<div class="message success">Broadcast successfully. Balance will update once mined. <a href="${link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">View on explorer &rarr;</a></div>`;
      pushActivity({ type: "sent", title: `Self-pay ${amount.toString()}`, detail: "consolidated own UTXOs" });
      amountInput.value = "";
      await refreshBalance();
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  renderHistory();

  async function refreshFeeNotes() {
    const [fee, nameFee, assetFee] = await Promise.all([getSuggestedFee(), getSuggestedNameFee(), getSuggestedAssetFee()]);
    const text = `current fee: ${fee}`;
    ["send-fee-note", "name-send-fee-note"].forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    });
    const nameFeeEl = document.getElementById("register-name-fee-note");
    if (nameFeeEl) nameFeeEl.textContent = `current fee: ${nameFee}`;
    const assetFeeEl = document.getElementById("mint-asset-fee-note");
    if (assetFeeEl) assetFeeEl.textContent = `current fee: ${assetFee}`;
  }
  refreshFeeNotes();

  // Live-checks the recipient as the user types (debounced) so a typo or a
  // not-yet-registered name is caught before the user even hits Send,
  // instead of only failing after building a slate. Purely advisory - the
  // Send handler below re-checks and is the actual gate.
  let nameSendLookupTimer = null;
  document.getElementById("name-send-recipient").addEventListener("input", () => {
    const statusEl = document.getElementById("name-send-lookup-status");
    const raw = document.getElementById("name-send-recipient").value;
    clearTimeout(nameSendLookupTimer);
    if (!raw.trim()) { statusEl.textContent = ""; return; }
    const bare = parseHazeAddress(raw);
    if (!bare) { statusEl.textContent = `Must end in ".haze", e.g. harshit.haze`; return; }
    statusEl.textContent = "Looking up...";
    nameSendLookupTimer = setTimeout(async () => {
      try {
        const res = await fetch(API_BASE + "/v1/names/" + encodeURIComponent(bare));
        statusEl.textContent = res.ok ? `"${displayName(bare)}" found on-chain.` : `"${displayName(bare)}" is not registered.`;
      } catch (e) {
        statusEl.textContent = "Couldn't reach the node to look this up.";
      }
    }, 400);
  });

  document.getElementById("name-send-btn").addEventListener("click", async () => {
    const rawInput = document.getElementById("name-send-recipient").value;
    const amount = BigInt(document.getElementById("name-send-amount").value || "0");
    const messageEl = document.getElementById("name-send-message");

    const toName = parseHazeAddress(rawInput);
    if (!toName) {
      messageEl.innerHTML = `<div class="message error">Enter the recipient's full name including the ".haze" suffix, e.g. harshit.haze.</div>`;
      return;
    }
    if (amount <= 0n) {
      messageEl.innerHTML = `<div class="message error">Enter an amount.</div>`;
      return;
    }
    if (pendingNameSend) {
      messageEl.innerHTML = `<div class="message error">You already have a send to "${displayName(pendingNameSend.toName)}" awaiting acceptance. Wait for it to complete first.</div>`;
      return;
    }

    try {
      const nameRes = await fetch(API_BASE + "/v1/names/" + encodeURIComponent(toName));
      if (!nameRes.ok) {
        messageEl.innerHTML = `<div class="message error">"${displayName(toName)}" is not registered.</div>`;
        return;
      }
      const record = await nameRes.json();
      const toPubkeyHex = bytesToHex(record.resolves_to);

      const storeBytes = loadWalletStoreBytes();
      const fee = await getSuggestedFee();
      const slate = create_send_slate(sessionKeystoreBytes, storeBytes, amount, fee);
      sessionKeystoreBytes = slate.updated_keystore_bytes;

      const inboxRes = await postToInbox(toPubkeyHex, "request", slate.slate_json);
      if (!inboxRes.ok) {
        messageEl.innerHTML = `<div class="message error">Failed to deliver payment request.</div>`;
        return;
      }

      pendingNameSend = { toName, pendingSlateBytes: slate.pending_slate_bytes, amount: amount.toString() };
      messageEl.innerHTML = `<div class="message success">Sent to "${displayName(toName)}" - waiting for them to accept&hellip;</div>`;
      document.getElementById("name-send-recipient").value = "";
      document.getElementById("name-send-amount").value = "";
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  // Crypto-necessary step, not a user decision: the receiver still has to
  // locally compute their output's blinding factor and send back a partial
  // signature (that's what makes it a two-party Mimblewimble payment rather
  // than an account balance the sender could just edit) - but there's no
  // reason a person needs to click a button to make that happen. The wallet
  // does it the instant it sees the request during its normal inbox poll.
  async function autoAcceptIncomingRequest(msg) {
    const responded = respond_to_slate(sessionKeystoreBytes, msg.payload_json);
    sessionKeystoreBytes = responded.updated_keystore_bytes;

    let storeBytes = loadWalletStoreBytes();
    storeBytes = commit_receive(storeBytes, responded.receiver_output);
    saveWalletStoreBytes(storeBytes);

    await postToInbox(msg.from_pubkey_hex, "response", responded.response_slate_json);

    pushActivity({
      type: "received",
      title: `Received ${responded.receiver_output.value.toString()}`,
      detail: `from ${msg.from_pubkey_hex}`,
    });
  }

  // Seller-side auto-response to a marketplace buyer's "want_transfer" -
  // same "no reason a person needs to click a button" philosophy as
  // autoAcceptIncomingRequest above. Signing this costs nothing: the
  // resulting TransferAssetOp is conditioned on a kernel excess that only
  // becomes real once the buyer's payment actually lands on-chain (see
  // core::assets::TransferAssetOp::required_kernel_excess) - if the buyer
  // never broadcasts that payment, this signed transfer is simply inert
  // forever, and this wallet keeps the asset. If the asset's collection
  // charges a royalty, req.royalty_kernel_excess_hex is a second,
  // independent condition (see required_royalty_kernel_excess) - the seller
  // just passes it through here; consensus (not the seller) is what
  // actually enforces the creator gets paid before this transfer can apply.
  async function autoRespondToWantTransfer(msg) {
    const req = JSON.parse(msg.payload_json);
    const opJson = build_transfer_asset_request(sessionKeystoreBytes, req.asset_id, req.buyer_pubkey_hex, req.kernel_excess_hex, req.royalty_kernel_excess_hex || null);

    await postToInbox(req.buyer_pubkey_hex, "signed_transfer", JSON.stringify({ op_json: opJson }));
  }

  // Collection-creator-side auto-response to a minter's "want_collection_mint"
  // - same "no reason a person needs to click a button" philosophy. Unlike
  // autoRespondToWantTransfer (which signs the WHOLE conditional transfer),
  // a mint is signed by its own new owner (the minter) - this wallet only
  // contributes a separate approval co-signature over the exact same
  // (asset_id, collection_id, phase_index, required_kernel_excess,
  // owner_pubkey) combination, which is what actually ties the mint to a
  // real payment (see core::assets::MintAssetOp::creator_signature's doc
  // comment - without this, a minter could reference any unrelated
  // pre-existing kernel and mint for free). Only responds if this wallet
  // really is the collection's registered creator.
  async function autoRespondToWantCollectionMint(msg) {
    const req = JSON.parse(msg.payload_json);
    const myPubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);

    const collection = await fetchJson(`/v1/collections/${encodeURIComponent(req.collection_id)}`);
    if (bytesToHex(collection.creator_pubkey) !== myPubkeyHex) return; // not our collection - ignore

    const signatureHex = sign_collection_mint_approval(sessionKeystoreBytes, req.asset_id, req.collection_id, req.phase_index, req.required_kernel_excess_hex, req.owner_pubkey_hex);

    await postToInbox(req.owner_pubkey_hex, "signed_collection_mint", JSON.stringify({ creator_signature_hex: signatureHex }));
  }

  // Sends "want_transfer" to the seller once every payment leg of the
  // current purchase has a response - just the seller's own leg for a
  // non-royalty asset, or both the seller's and the collection creator's
  // legs for one that charges a royalty (see the "buy" deep-link handler
  // and the two "response" branches in pollInbox below). Both kernel
  // excesses are included whenever a royalty leg exists, so the seller can
  // build a TransferAssetOp conditioned on both (see
  // core::assets::TransferAssetOp::required_royalty_kernel_excess).
  async function maybeSendWantTransfer() {
    if (!pendingPurchase || !pendingPurchase.sellerDone || !pendingPurchase.royaltyDone) return;
    const myPubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
    await postToInbox(pendingPurchase.sellerPubkeyHex, "want_transfer", JSON.stringify({
      asset_id: pendingPurchase.assetId,
      buyer_pubkey_hex: myPubkeyHex,
      kernel_excess_hex: pendingPurchase.kernelExcessHex,
      royalty_kernel_excess_hex: pendingPurchase.royaltyKernelExcessHex || null,
    }));
    const messageEl = document.getElementById("buy-asset-message");
    messageEl.innerHTML = `<div class="message success">Payment${pendingPurchase.hasRoyaltyLeg ? "s" : ""} accepted for "${pendingPurchase.assetId}" - waiting for the seller to sign the transfer&hellip;</div>`;
  }

  async function pollInbox() {
    try {
      const myPubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
      const res = await getFromInbox(myPubkeyHex);
      if (!res.ok) return;
      const messages = await res.json();

      for (const msg of messages) {
        if (msg.kind === "response" && pendingNameSend) {
          const messageEl = document.getElementById("name-send-message");
          try {
            const finalized = finalize_slate(pendingNameSend.pendingSlateBytes, msg.payload_json);
            const res2 = await fetch(API_BASE + "/v1/transactions", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: finalized.transaction_json,
            });
            if (!res2.ok) {
              const text = await res2.text();
              messageEl.innerHTML = `<div class="message error">Node rejected transaction: ${text}</div>`;
              pendingNameSend = null;
              continue;
            }
            let storeBytes = loadWalletStoreBytes();
            storeBytes = commit_slate_send(storeBytes, finalized.spent_commitments_hex, finalized.change);
            saveWalletStoreBytes(storeBytes);

            const link = explorerLinkForTx(finalized.transaction_json);
            messageEl.innerHTML = `<div class="message success">"${displayName(pendingNameSend.toName)}" accepted - broadcast successfully. <a href="${link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">View on explorer &rarr;</a></div>`;
            pushActivity({ type: "sent", title: `Sent ${pendingNameSend.amount}`, detail: `to ${displayName(pendingNameSend.toName)}` });
            pendingNameSend = null;
            await refreshBalance();
          } catch (e) {
            messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
            pendingNameSend = null;
          }
        } else if (msg.kind === "response" && pendingPurchase && msg.from_pubkey_hex === pendingPurchase.sellerPubkeyHex) {
          // Step 3 of the marketplace handshake: the seller accepted our
          // payment slate. Finalize it LOCALLY but do NOT broadcast yet -
          // the payment and the asset transfer must go out together (see
          // "signed_transfer" below), otherwise a defecting seller could
          // pocket the payment without ever sending the transfer back. If
          // this purchase also has a royalty leg (see the "buy" deep-link
          // handler above), "want_transfer" isn't sent until BOTH legs have
          // a response - see the shared maybeSendWantTransfer() below.
          const messageEl = document.getElementById("buy-asset-message");
          try {
            const finalized = finalize_slate(pendingPurchase.pendingSlateBytes, msg.payload_json);
            const kernelExcessHex = tx_kernel_excess_hex(finalized.transaction_json);
            pendingPurchase = {
              ...pendingPurchase,
              finalizedTxJson: finalized.transaction_json,
              spentCommitmentsHex: finalized.spent_commitments_hex,
              change: finalized.change,
              kernelExcessHex,
              sellerDone: true,
            };
            messageEl.innerHTML = `<div class="message success">Seller accepted the payment for "${pendingPurchase.assetId}"${pendingPurchase.royaltyDone ? "" : " - waiting for the creator to accept the royalty&hellip;"}</div>`;
            await maybeSendWantTransfer();
          } catch (e) {
            messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
            pendingPurchase = null;
          }
        } else if (msg.kind === "response" && pendingPurchase && pendingPurchase.hasRoyaltyLeg && msg.from_pubkey_hex === pendingPurchase.royaltyPubkeyHex) {
          // The royalty leg's own independent response, from the collection's
          // creator rather than the seller - same finalize-but-don't-broadcast
          // reasoning as the seller leg above.
          const messageEl = document.getElementById("buy-asset-message");
          try {
            const finalized = finalize_slate(pendingPurchase.pendingRoyaltySlateBytes, msg.payload_json);
            const royaltyKernelExcessHex = tx_kernel_excess_hex(finalized.transaction_json);
            pendingPurchase = {
              ...pendingPurchase,
              finalizedRoyaltyTxJson: finalized.transaction_json,
              royaltySpentCommitmentsHex: finalized.spent_commitments_hex,
              royaltyChange: finalized.change,
              royaltyKernelExcessHex,
              royaltyDone: true,
            };
            messageEl.innerHTML = `<div class="message success">Creator accepted the royalty for "${pendingPurchase.assetId}"${pendingPurchase.sellerDone ? "" : " - waiting for the seller to accept&hellip;"}</div>`;
            await maybeSendWantTransfer();
          } catch (e) {
            messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
            pendingPurchase = null;
          }
        } else if (msg.kind === "signed_transfer" && pendingPurchase && msg.from_pubkey_hex === pendingPurchase.sellerPubkeyHex) {
          // Step 5: we now hold a signed conditional transfer. Broadcast the
          // payment FIRST - the transfer is inert until that kernel exists
          // on-chain, so there's no ordering risk in doing it this way, and
          // no further cooperation from the seller is needed from here on.
          const messageEl = document.getElementById("buy-asset-message");
          try {
            const { op_json } = JSON.parse(msg.payload_json);

            const payRes = await fetch(API_BASE + "/v1/transactions", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: pendingPurchase.finalizedTxJson,
            });
            if (!payRes.ok) {
              const text = await payRes.text();
              messageEl.innerHTML = `<div class="message error">Node rejected payment: ${text}</div>`;
              pendingPurchase = null;
              continue;
            }
            // If this purchase has a royalty leg, the seller leg's
            // spent_commitments/change were already committed EAGERLY back
            // in the "buy" deep-link handler (before the royalty slate was
            // even built, to avoid a UTXO collision between the two) -
            // committing it again here would duplicate the change output
            // (WalletStore::add_output isn't idempotent). Only a purchase
            // with no royalty leg at all still needs it committed here.
            if (!pendingPurchase.hasRoyaltyLeg) {
              let storeBytes = loadWalletStoreBytes();
              storeBytes = commit_slate_send(storeBytes, pendingPurchase.spentCommitmentsHex, pendingPurchase.change);
              saveWalletStoreBytes(storeBytes);
            }

            // The royalty leg (if this asset's collection charges one) is a
            // second, independent payment - broadcast it too before the
            // transfer, same reasoning as the seller's own payment above.
            if (pendingPurchase.hasRoyaltyLeg) {
              const royaltyPayRes = await fetch(API_BASE + "/v1/transactions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: pendingPurchase.finalizedRoyaltyTxJson,
              });
              if (!royaltyPayRes.ok) {
                const text = await royaltyPayRes.text();
                messageEl.innerHTML = `<div class="message error">Node rejected the royalty payment: ${text}</div>`;
                pendingPurchase = null;
                continue;
              }
              let storeBytes2 = loadWalletStoreBytes();
              storeBytes2 = commit_slate_send(storeBytes2, pendingPurchase.royaltySpentCommitmentsHex, pendingPurchase.royaltyChange);
              saveWalletStoreBytes(storeBytes2);
            }

            const transferRes = await fetch(API_BASE + "/v1/assets/transfer", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: op_json,
            });
            const assetId = pendingPurchase.assetId;
            const purchasePrice = pendingPurchase.price;
            const dealReturnUrl = pendingPurchase.returnUrl;
            const redirectBack = (extra) => {
              if (!dealReturnUrl) return;
              const sep = dealReturnUrl.includes("?") ? "&" : "?";
              window.location.href = `${dealReturnUrl}${sep}${extra}`;
            };
            if (!transferRes.ok) {
              const errJson = await transferRes.json().catch(() => ({}));
              // The payment already broadcast successfully - the transfer
              // itself was never queued (see retrySubmitAssetTransfer's doc
              // comment), most likely because the payment hasn't been mined
              // yet. Actively keep re-submitting the same signed op_json -
              // nothing is lost by retrying, since it's the exact same
              // conditional transfer the seller already signed.
              messageEl.innerHTML = `<div class="message error">Payment broadcast, but the transfer wasn't accepted yet (${errJson.error || transferRes.status}) - retrying once your payment is mined&hellip;</div>`;
              retrySubmitAssetTransfer(op_json, assetId, () => {
                messageEl.innerHTML = `<div class="message success">"${assetId}" purchase complete.</div>`;
                pushActivity({ type: "asset_transferred", title: `Bought ${assetId}`, detail: `for ${purchasePrice}` });
                refreshBalance();
                redirectBack(`bought=1&asset_id=${encodeURIComponent(assetId)}`);
              }, () => {
                messageEl.innerHTML = `<div class="message error">"${assetId}" transfer still hasn't been accepted - your payment was broadcast, so nothing is lost, but you may need to try submitting the transfer again later.</div>`;
                redirectBack(`bought=0&asset_id=${encodeURIComponent(assetId)}`);
              });
              pendingPurchase = null;
              continue;
            }

            messageEl.innerHTML = `<div class="message success">"${assetId}" purchase complete - both broadcast successfully.</div>`;
            pushActivity({ type: "asset_transferred", title: `Bought ${assetId}`, detail: `for ${purchasePrice}` });
            pendingPurchase = null;
            await refreshBalance();
            redirectBack(`bought=1&asset_id=${encodeURIComponent(assetId)}`);
          } catch (e) {
            messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
            pendingPurchase = null;
          }
        } else if (msg.kind === "response" && pendingCollectionMint && msg.from_pubkey_hex === pendingCollectionMint.creatorPubkeyHex) {
          // Mirrors the marketplace buy flow's "response" handling (step 3):
          // the creator accepted our payment slate. Finalize LOCALLY but do
          // NOT broadcast yet - build our own conditional mint op first (see
          // "signed_collection_mint" below), so payment and mint go out
          // together once the creator has approved it.
          const messageEl = document.getElementById("collection-mint-message");
          try {
            const finalized = finalize_slate(pendingCollectionMint.pendingSlateBytes, msg.payload_json);
            const kernelExcessHex = tx_kernel_excess_hex(finalized.transaction_json);
            const fee = await getSuggestedAssetFee();

            // Mark the payment's own inputs as spent LOCALLY right away
            // (even though we haven't broadcast it yet - we already hold a
            // fully finalized, about-to-be-broadcast transaction spending
            // them) before selecting UTXOs for the mint's separate
            // fee_payment. Building the mint op against the wallet store's
            // still-unspent view would let it pick the SAME UTXO the
            // payment already claims - a real bug hit during testing: the
            // mint's fee_payment input collided with the payment's input,
            // so once the payment landed on-chain, the mint's fee_payment
            // referenced an already-spent UTXO and was silently dropped by
            // every subsequent block-assembly attempt.
            let storeBytes = loadWalletStoreBytes();
            storeBytes = commit_slate_send(storeBytes, finalized.spent_commitments_hex, finalized.change);
            saveWalletStoreBytes(storeBytes);

            const built = build_collection_mint_asset_request(
              sessionKeystoreBytes, storeBytes, pendingCollectionMint.assetId, pendingCollectionMint.metadata, fee,
              pendingCollectionMint.collectionId, pendingCollectionMint.phaseIndex,
              pendingCollectionMint.allowlistProofHex, pendingCollectionMint.allowlistLeafIndex, kernelExcessHex,
            );
            sessionKeystoreBytes = built.updated_keystore_bytes;
            pendingCollectionMint = {
              ...pendingCollectionMint,
              opJson: built.op_json,
              mintSpentCommitmentsHex: built.spent_commitments_hex,
              mintChange: built.change,
              finalizedTxJson: finalized.transaction_json,
              spentCommitmentsHex: finalized.spent_commitments_hex,
              change: finalized.change,
              paymentAlreadyCommitted: true,
            };
            await postToInbox(pendingCollectionMint.creatorPubkeyHex, "want_collection_mint", JSON.stringify({
              asset_id: pendingCollectionMint.assetId,
              collection_id: pendingCollectionMint.collectionId,
              phase_index: pendingCollectionMint.phaseIndex,
              owner_pubkey_hex: myPubkeyHex,
              required_kernel_excess_hex: kernelExcessHex,
            }));
            messageEl.innerHTML = `<div class="message success">Payment accepted for "${pendingCollectionMint.assetId}" - waiting for the creator's approval&hellip;</div>`;
          } catch (e) {
            messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
            pendingCollectionMint = null;
          }
        } else if (msg.kind === "signed_collection_mint" && pendingCollectionMint && msg.from_pubkey_hex === pendingCollectionMint.creatorPubkeyHex) {
          // We now hold the creator's approval co-signature. Broadcast the
          // payment FIRST, then attach the approval and broadcast the mint -
          // the mint is inert until that payment's kernel exists on-chain,
          // so there's no ordering risk in doing it this way.
          const messageEl = document.getElementById("collection-mint-message");
          try {
            const { creator_signature_hex } = JSON.parse(msg.payload_json);
            const finalOpJson = attach_creator_signature_to_mint(pendingCollectionMint.opJson, creator_signature_hex);

            const payRes = await fetch(API_BASE + "/v1/transactions", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: pendingCollectionMint.finalizedTxJson,
            });
            if (!payRes.ok) {
              const text = await payRes.text();
              messageEl.innerHTML = `<div class="message error">Node rejected payment: ${text}</div>`;
              pendingCollectionMint = null;
              continue;
            }
            // The payment's inputs were already marked spent locally back
            // when this op was built (see the "response" handler above) -
            // doing it again here would double-apply against a wallet
            // store that may have moved on since. Only the mint's own
            // fee_payment still needs committing.
            let storeBytes = loadWalletStoreBytes();
            if (pendingCollectionMint.mintChange) {
              storeBytes = commit_mint_asset(storeBytes, pendingCollectionMint.mintSpentCommitmentsHex, pendingCollectionMint.mintChange);
            }
            saveWalletStoreBytes(storeBytes);

            const assetId = pendingCollectionMint.assetId;
            const mintReturnUrl = pendingCollectionMint.returnUrl;
            const mintRedirectBack = (extra) => {
              if (!mintReturnUrl) return;
              const sep = mintReturnUrl.includes("?") ? "&" : "?";
              window.location.href = `${mintReturnUrl}${sep}${extra}`;
            };
            const mintRes = await fetch(API_BASE + "/v1/assets/mint", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: finalOpJson,
            });
            if (!mintRes.ok) {
              const errJson = await mintRes.json().catch(() => ({}));
              messageEl.innerHTML = `<div class="message error">Payment broadcast, but the mint wasn't accepted yet (${errJson.error || mintRes.status}) - retrying once your payment is mined&hellip;</div>`;
              retrySubmitAssetTransfer(finalOpJson, assetId, () => {
                messageEl.innerHTML = `<div class="message success">"${assetId}" minted.</div>`;
                pushActivity({ type: "collection_mint", title: `Minted ${assetId}`, detail: `from ${pendingCollectionMint.collectionId}` });
                refreshBalance();
                mintRedirectBack(`minted=1&asset_id=${encodeURIComponent(assetId)}`);
              }, () => {
                messageEl.innerHTML = `<div class="message error">"${assetId}" mint still hasn't been accepted - your payment was broadcast, so nothing is lost, but you may need to try again later.</div>`;
                mintRedirectBack(`minted=0&asset_id=${encodeURIComponent(assetId)}`);
              }, { endpoint: "/v1/assets/mint" });
              pendingCollectionMint = null;
              continue;
            }

            messageEl.innerHTML = `<div class="message success">"${assetId}" minted - both broadcast successfully.</div>`;
            pushActivity({ type: "collection_mint", title: `Minted ${assetId}`, detail: `from ${pendingCollectionMint.collectionId}` });
            pendingCollectionMint = null;
            await refreshBalance();
            mintRedirectBack(`minted=1&asset_id=${encodeURIComponent(assetId)}`);
          } catch (e) {
            messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
            pendingCollectionMint = null;
          }
        } else if (msg.kind === "request") {
          try {
            await autoAcceptIncomingRequest(msg);
          } catch (e) {
            // This message is lost (already drained from the inbox by the
            // GET above) - next poll just continues with whatever else is
            // pending, same as any other transient failure here.
          }
        } else if (msg.kind === "want_transfer") {
          try {
            await autoRespondToWantTransfer(msg);
          } catch (e) {
            // Same reasoning as the "request" branch above - lost, retried
            // implicitly if the buyer's wallet re-sends.
          }
        } else if (msg.kind === "want_collection_mint") {
          try {
            await autoRespondToWantCollectionMint(msg);
          } catch (e) {
            // Same reasoning as the "request" branch above.
          }
        }
      }
      if (messages.some(m => m.kind === "request")) {
        await refreshBalance();
      }
    } catch (e) {
      // transient - next poll will retry
    }
  }

  handleMarketplaceDeepLink();
  refreshBalance();
  resolveMyName();
  setInterval(refreshBalance, 4000);
  setInterval(pollInbox, 3000);
  setInterval(refreshFeeNotes, 8000);
}

// ---------- boot ----------
async function boot() {
  await init();
  renderNodeIndicator(false);
  renderLockScreen();
}
boot();
</script>
