<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Haze &mdash; Wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,340..600&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  // Applied synchronously, before CSS paints, to avoid a flash of the wrong
  // theme on load - a saved choice always wins; otherwise falls back to the
  // OS preference.
  (function () {
    var saved = localStorage.getItem("hazeTheme");
    var theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<style>
  :root {
    color-scheme: dark;
    --fog-0: oklch(0.15 0.014 292);
    --fog-1: oklch(0.19 0.016 292);
    --fog-2: oklch(0.24 0.018 292);
    --fog-3: oklch(0.32 0.02 292);
    --mist: oklch(0.68 0.05 285);
    --ink: oklch(0.93 0.012 90);
    --ink-dim: oklch(0.93 0.012 90 / 0.62);
    --ink-faint: oklch(0.93 0.012 90 / 0.34);
    --amber: oklch(0.78 0.15 70);
    --amber-dim: oklch(0.78 0.15 70 / 0.16);
    --ok: oklch(0.75 0.14 155);
    --danger: oklch(0.7 0.16 25);
    --glow-1: oklch(0.26 0.03 296 / 0.55);
    --glow-2: oklch(0.22 0.03 70 / 0.12);
    --card-veil: oklch(0.22 0.02 292 / 0.55);
    --hairline: oklch(1 0 0 / 0.09);
    --shadow-1: oklch(0 0 0 / 0.4);
    --shadow-2: oklch(1 0 0 / 0.07);
    --font-display: "Fraunces", serif;
    --font-body: "Public Sans", sans-serif;
    --font-mono: "IBM Plex Mono", monospace;
  }

  :root[data-theme="light"] {
    color-scheme: light;
    --fog-0: oklch(0.98 0.006 292);
    --fog-1: oklch(0.955 0.008 292);
    --fog-2: oklch(0.90 0.01 292);
    --fog-3: oklch(0.82 0.014 292);
    --mist: oklch(0.52 0.09 285);
    --ink: oklch(0.22 0.014 292);
    --ink-dim: oklch(0.22 0.014 292 / 0.68);
    --ink-faint: oklch(0.22 0.014 292 / 0.42);
    --amber: oklch(0.58 0.15 70);
    --amber-dim: oklch(0.58 0.15 70 / 0.12);
    --ok: oklch(0.52 0.14 155);
    --danger: oklch(0.55 0.18 25);
    --glow-1: oklch(0.9 0.02 296 / 0.5);
    --glow-2: oklch(0.92 0.03 70 / 0.35);
    --card-veil: oklch(0.93 0.012 292 / 0.65);
    --hairline: oklch(0 0 0 / 0.08);
    --shadow-1: oklch(0 0 0 / 0.12);
    --shadow-2: oklch(1 0 0 / 0.6);
  }

  * { box-sizing: border-box; }

  body {
    background:
      radial-gradient(ellipse 900px 500px at 12% -10%, var(--glow-1), transparent),
      radial-gradient(ellipse 700px 500px at 100% 10%, var(--glow-2), transparent),
      var(--fog-0);
    color: var(--ink);
    font-family: var(--font-body);
    margin: 0;
    min-height: 100vh;
    padding: clamp(16px, 4vw, 44px) clamp(16px, 5vw, 64px) 110px;
  }

  .topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: clamp(28px, 4vw, 48px);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark { font-family: var(--font-display); font-size: 30px; font-style: italic; font-weight: 480; color: var(--amber); line-height: 1; }
  .brand-name { font-family: var(--font-display); font-optical-sizing: auto; font-weight: 460; font-size: clamp(26px, 3vw, 34px); letter-spacing: -0.01em; line-height: 1; }
  .brand-tag {
    display: flex;
    align-items: center;
    height: 22px;
    font-size: 12.5px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    padding-left: 14px;
    border-left: 1px solid var(--fog-3);
  }

  .node-indicator {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-faint);
    background: var(--fog-1);
    border: 1px solid var(--fog-3);
    border-radius: 3px;
    padding: 7px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .node-indicator .node-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); flex-shrink: 0; }
  .node-indicator .node-dot.online { background: var(--ok); box-shadow: 0 0 0 3px color-mix(in oklch, var(--ok) 15%, transparent); }
  .node-indicator .node-dot.offline { background: var(--danger); box-shadow: 0 0 0 3px color-mix(in oklch, var(--danger) 15%, transparent); }
  /* A real node URL (e.g. https://node.hazeprotocol.xyz) is much longer
     than the placeholder em-dash this pill was sized around - without a
     cap it can push the pill wide enough to overflow a narrow topbar. */
  #node-label { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .theme-toggle {
    font-family: var(--font-mono);
    color: var(--ink-faint);
    background: var(--fog-1);
    border: 1px solid var(--fog-3);
    border-radius: 3px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .theme-toggle:hover { border-color: var(--mist); color: var(--ink-dim); }
  .theme-toggle svg { width: 15px; height: 15px; }
  .theme-toggle .icon-moon { display: none; }
  :root[data-theme="light"] .theme-toggle .icon-sun { display: none; }
  :root[data-theme="light"] .theme-toggle .icon-moon { display: block; }

  .panel {
    max-width: 480px;
    background: var(--fog-1);
    border: 1px solid var(--fog-3);
    border-radius: 6px;
    padding: clamp(24px, 4vw, 36px);
  }
  .panel h2 { font-family: var(--font-display); font-weight: 460; font-size: 22px; margin: 0 0 6px; }
  .panel .sub { color: var(--ink-faint); font-size: 13.5px; margin-bottom: 22px; line-height: 1.5; }

  label { display: block; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint); margin: 16px 0 6px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%;
    background: var(--fog-2);
    border: 1px solid var(--fog-3);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 14px;
    border-radius: 3px;
    padding: 12px 14px;
    outline: none;
  }
  input:focus { border-color: var(--mist); }
  textarea {
    width: 100%;
    background: var(--fog-2);
    border: 1px solid var(--fog-3);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 12px;
    border-radius: 3px;
    padding: 12px 14px;
    outline: none;
    resize: vertical;
    min-height: 84px;
  }
  textarea:focus { border-color: var(--mist); }

  button {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    border-radius: 999px;
    padding: 13px 24px;
    border: none;
    cursor: pointer;
    margin-top: 18px;
  }
  .btn-primary { background: var(--amber); color: var(--fog-0); width: 100%; }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-ghost { background: transparent; color: var(--ink-dim); border: 1px solid var(--fog-3); }
  .btn-ghost:hover { color: var(--ink); border-color: var(--mist); }
  .btn-small { padding: 9px 18px; font-size: 12.5px; margin-top: 0; }

  .toggle-link { color: var(--mist); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; font-size: 13px; margin-top: 14px; display: inline-block; }

  .message { font-size: 13px; padding: 10px 14px; border-radius: 3px; margin-top: 14px; }
  .message.error { background: color-mix(in oklch, var(--danger) 12%, transparent); color: var(--danger); border: 1px solid color-mix(in oklch, var(--danger) 30%, transparent); }
  .message.success { background: color-mix(in oklch, var(--ok) 12%, transparent); color: var(--ok); border: 1px solid color-mix(in oklch, var(--ok) 30%, transparent); }

  .dashboard { display: grid; gap: 24px; max-width: 620px; }
  .stat-row { display: flex; gap: clamp(24px, 4vw, 52px); flex-wrap: wrap; padding-bottom: 20px; border-bottom: 1px solid var(--fog-2); }
  .stat-item .stat-label { font-size: 11.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
  .stat-item .stat-value { font-family: var(--font-display); font-size: 36px; font-weight: 460; font-variant-numeric: tabular-nums; }
  .stat-item .stat-value.accent { color: var(--amber); }

  .action-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .keystore-note { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); word-break: break-all; margin-top: 4px; }

  .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 10px; }
  .asset-card { background: var(--fog-1); border: 1px solid var(--fog-3); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .asset-card-image { width: 100%; aspect-ratio: 1; border-radius: 6px; object-fit: cover; background: var(--fog-2); }
  .asset-card-title { font-family: var(--font-display); font-size: 14px; font-weight: 500; }
  .asset-card-id { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); word-break: break-all; }

  .receive-name-value {
    font-family: var(--font-display);
    font-size: clamp(26px, 5vw, 34px);
    font-weight: 460;
    color: var(--amber);
    text-align: center;
    padding: 22px 12px;
    background: var(--fog-2);
    border: 1px solid var(--fog-3);
    border-radius: 6px;
    margin-bottom: 18px;
    word-break: break-word;
  }

  .inbox-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--fog-2); }
  .inbox-item:last-child { border-bottom: none; }
  .inbox-item .inbox-item-text { font-size: 13.5px; }
  .inbox-item .inbox-item-from { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); word-break: break-all; }
  .inbox-item button { margin-top: 0; flex-shrink: 0; }

  /* ---------- tabbed dashboard + floating glass bottom nav ---------- */
  .tab-panel { display: none; }
  .tab-panel.active { display: grid; gap: 24px; animation: tab-in 0.18s ease-out; }
  @keyframes tab-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .bottom-nav {
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    gap: 2px;
    padding: 6px;
    border-radius: 999px;
    background: var(--card-veil);
    backdrop-filter: blur(22px) saturate(170%);
    -webkit-backdrop-filter: blur(22px) saturate(170%);
    border: 1px solid var(--hairline);
    box-shadow: 0 12px 36px var(--shadow-1), inset 0 1px 0 var(--shadow-2);
    max-width: calc(100vw - 24px);
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    width: 50px;
    padding: 9px 2px 8px;
    border-radius: 999px;
    background: transparent;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    margin: 0;
    transition: background 0.16s ease, color 0.16s ease;
  }
  .nav-item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; display: block; }
  .nav-item .nav-label { font-family: var(--font-body); font-size: 8.5px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
  .nav-item:hover { color: var(--ink); }
  .nav-item.active { background: var(--amber-dim); color: var(--amber); }
  .nav-item.active svg { stroke: var(--amber); }

  /* 7 nav-items x 50px is ~374px total (plus padding/gaps) - overflows the
     viewport on any phone narrower than that (most Android phones are
     360px or narrower; even a 375px iPhone SE has near-zero margin). Below
     400px, drop the width/gap/padding and hide the tiny label text
     (icon-only bottom nav is a standard, well-understood mobile pattern)
     so all 7 items actually fit and stay tappable. */
  @media (max-width: 400px) {
    .bottom-nav { gap: 0; padding: 5px; }
    .nav-item { width: 40px; padding: 9px 0; }
    .nav-item .nav-label { display: none; }
  }

  /* ---------- home-screen quick actions (Trust Wallet/MetaMask style) ---------- */
  .quick-actions { display: flex; gap: clamp(10px, 3vw, 20px); }
  .quick-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: none;
    color: var(--ink-dim);
    cursor: pointer;
    margin: 0;
    padding: 0;
    flex: 1;
  }
  .quick-action .quick-action-circle {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--fog-1);
    border: 1px solid var(--fog-3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.16s ease, border-color 0.16s ease;
  }
  .quick-action svg { width: 20px; height: 20px; stroke: var(--amber); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .quick-action .quick-action-label { font-size: 11.5px; font-weight: 600; color: var(--ink-dim); }
  .quick-action:hover .quick-action-circle { background: var(--amber-dim); border-color: var(--amber); }

  /* ---------- history / activity log ---------- */
  .activity-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--fog-2); }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--fog-2);
  }
  .activity-icon svg { width: 16px; height: 16px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .activity-icon.in { background: color-mix(in oklch, var(--ok) 14%, transparent); }
  .activity-icon.in svg { stroke: var(--ok); }
  .activity-icon.out { background: var(--amber-dim); }
  .activity-icon.out svg { stroke: var(--amber); }
  .activity-icon.meta { background: color-mix(in oklch, var(--mist) 16%, transparent); }
  .activity-icon.meta svg { stroke: var(--mist); }
  .activity-body { flex: 1; min-width: 0; }
  .activity-title { font-size: 13.5px; font-weight: 600; }
  .activity-detail { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); word-break: break-all; margin-top: 2px; }
  .activity-time { font-size: 11px; color: var(--ink-faint); flex-shrink: 0; white-space: nowrap; }
  .activity-empty { color: var(--ink-faint); font-size: 13.5px; padding: 12px 0; }

  ::selection { background: var(--amber-dim); }
</style>

    <div class="brand">
      <span class="brand-mark">&#9686;</span>
      <span class="brand-name">Haze</span>
      <span class="brand-tag">wallet</span>
      <span class="brand-tag" id="my-name-badge" style="display:none;"></span>
    </div>

      <button class="theme-toggle" id="theme-toggle" title="Toggle light / dark mode" aria-label="Toggle light / dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>

<script>
document.getElementById("theme-toggle").addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("hazeTheme", next);

<script type="module">
import init, {
  generate_keystore, wallet_store_new, reconcile_wallet_store,
  wallet_balance, wallet_pending_balance, plan_send, commit_send,
  create_send_slate, respond_to_slate, finalize_slate, commit_receive, commit_slate_send, pending_slate_reservation,
  build_stake_request, reveal_stake_blinding_hex,
  build_register_name_request, commit_register_name, wallet_identity_pubkey_hex,
  build_sponsored_register_name_request,
  build_transfer_name_request,
  build_mint_asset_request, commit_mint_asset, build_transfer_asset_request, tx_kernel_excess_hex,
  build_create_listing_request, build_cancel_listing_request,
  sign_identity_message,
  build_launch_collection_request, sign_allowlist_publish,
  build_collection_mint_asset_request, attach_creator_signature_to_mint,
  sign_collection_mint_approval, compute_allowlist_merkle_proof,
  generate_keystore_with_mnemonic, restore_keystore_from_mnemonic,
  recover_wallet_from_chain, sweep_validator_rewards,
  rotate_seed_transaction
} from './pkg/haze_core.js';

// ---------- Node API base (same convention as the explorer) ----------
const DEFAULT_API_BASE = "http://localhost:8332";
const API_STORAGE_KEY = "hazeApiBase";

function resolveApiBase() {
  const params = new URLSearchParams(window.location.search);
  const fromQuery = params.get("api");
  if (fromQuery) {
    localStorage.setItem(API_STORAGE_KEY, fromQuery);
    return fromQuery.replace(/\/+$/, "");
  }
  const saved = localStorage.getItem(API_STORAGE_KEY);
  if (saved) return saved.replace(/\/+$/, "");
  return DEFAULT_API_BASE;
}
let API_BASE = resolveApiBase();

function renderNodeIndicator(online) {
  document.getElementById("node-label").textContent = API_BASE;
  document.getElementById("node-dot").className = "node-dot " + (online ? "online" : "offline");
}
document.getElementById("node-indicator").addEventListener("click", () => {
  const next = window.prompt("Haze node API URL:", API_BASE);
  if (next && next.trim()) {
    API_BASE = next.trim().replace(/\/+$/, "");
    localStorage.setItem(API_STORAGE_KEY, API_BASE);
    renderNodeIndicator(false);
    refreshBalance();
  }
});

// ---------- base64 helpers ----------
const toB64 = (bytes) => btoa(String.fromCharCode(...bytes));
const fromB64 = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

// ---------- client-side keystore encryption (Web Crypto: PBKDF2 + AES-GCM) ----------
// The keystore holds the wallet's real secret seed. It is only ever decrypted
// into memory for the current session - never persisted in plaintext.
async function deriveKey(password, salt) {
  const keyMaterial = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

async function encryptKeystore(password, bytes) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const ciphertext = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, bytes));
  return { salt: toB64(salt), iv: toB64(iv), ciphertext: toB64(ciphertext) };
}

async function decryptKeystore(password, encrypted) {
  const salt = fromB64(encrypted.salt);
  const iv = fromB64(encrypted.iv);
  const ciphertext = fromB64(encrypted.ciphertext);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
  return new Uint8Array(plain);
}

const KEYSTORE_STORAGE_KEY = "hazeEncryptedKeystore";
const STORE_STORAGE_KEY = "hazeWalletStoreBytes";
// Set only once onboarding (mnemonic confirmed + funded + name registered)
// finishes - lets boot() resume onboarding after a reload instead of
// dropping straight into the dashboard with no name.
const ONBOARDING_STORAGE_KEY = "hazeOnboardingComplete";
// Cached copy of this wallet's own registered .haze name, purely a display
// convenience (the node's registry is the source of truth) - avoids a
// reverse-lookup scan of the whole registry on every dashboard load.
const MY_NAME_STORAGE_KEY = "hazeMyName";

function hasWallet() { return localStorage.getItem(KEYSTORE_STORAGE_KEY) !== null; }
function onboardingComplete() { return localStorage.getItem(ONBOARDING_STORAGE_KEY) === "true"; }
function loadWalletStoreBytes() {
  const b64 = localStorage.getItem(STORE_STORAGE_KEY);
  return b64 ? fromB64(b64) : wallet_store_new();
}
function saveWalletStoreBytes(bytes) {
  localStorage.setItem(STORE_STORAGE_KEY, toB64(bytes));
}
function saveMyName(name) { localStorage.setItem(MY_NAME_STORAGE_KEY, name); }
function loadMyName() { return localStorage.getItem(MY_NAME_STORAGE_KEY); }
function clearMyName() { localStorage.removeItem(MY_NAME_STORAGE_KEY); }

// ---------- unified activity/history log ----------
// A single append-only log of everything that moved funds or touched a name
// from this wallet, newest first - gives the History tab a real place to
// live instead of scattering "it worked" messages across Send/Receive/Names.
// Purely a local display record (the chain/registry are the source of
// truth for actual state); persisted so it survives a reload.
const ACTIVITY_STORAGE_KEY = "hazeActivityLog";
const MAX_ACTIVITY_ENTRIES = 50;

function loadActivity() {
  try {
    return JSON.parse(localStorage.getItem(ACTIVITY_STORAGE_KEY) || "[]");
  } catch (e) {
    return [];
  }
}
function pushActivity(entry) {
  const log = loadActivity();
  log.unshift({ ...entry, ts: Date.now() });
  log.length = Math.min(log.length, MAX_ACTIVITY_ENTRIES);
  localStorage.setItem(ACTIVITY_STORAGE_KEY, JSON.stringify(log));
  renderHistory();
}

function relativeTime(ts) {
  const seconds = Math.floor((Date.now() - ts) / 1000);
  if (seconds < 5) return "just now";
  if (seconds < 60) return `${seconds}s ago`;
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  return new Date(ts).toLocaleDateString();
}

const ACTIVITY_ICONS = {
  sent: { cls: "out", svg: '<path d="M7 17L17 7M8 7h9v9"/>' },
  received: { cls: "in", svg: '<path d="M17 7L7 17M16 17H7V8"/>' },
  faucet: { cls: "in", svg: '<path d="M12 4v12m0 0l-4-4m4 4l4-4M5 20h14"/>' },
  name_registered: { cls: "meta", svg: '<circle cx="12" cy="12" r="4"/><path d="M16 12v1.4a2.6 2.6 0 0 0 5 0V12a9 9 0 1 0-5.5 8.3"/>' },
  name_transferred: { cls: "meta", svg: '<path d="M4 12h13m0 0l-4-4m4 4l-4 4"/>' },
  validator: { cls: "meta", svg: '<path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/>' },
};

// Renders into the History tab if it's currently in the DOM - a no-op
// (harmlessly skipped) when called from other tabs, e.g. right after a
// send completes while the user is still looking at the Send tab.
function renderHistory() {
  const list = document.getElementById("history-list");
  if (!list) return;
  const log = loadActivity();
  if (log.length === 0) {
    list.innerHTML = `<div class="activity-empty">No activity yet - sends, receives, and name changes will show up here.</div>`;
    return;
  }
  list.innerHTML = log.map((entry) => {
    const icon = ACTIVITY_ICONS[entry.type] || ACTIVITY_ICONS.name_registered;
    return `
      <div class="activity-item">
        <div class="activity-icon ${icon.cls}"><svg viewBox="0 0 24 24">${icon.svg}</svg></div>
        <div class="activity-body">
          <div class="activity-title">${entry.title}</div>
          ${entry.detail ? `<div class="activity-detail">${entry.detail}</div>` : ""}
        </div>
        <div class="activity-time">${relativeTime(entry.ts)}</div>
      </div>
    `;
  }).join("");
}

    badge.style.display = "";
  } else {

// The Receive tab's whole job is showing this wallet's name so someone else
// can send to it - if there isn't one yet, point at the Names tab instead of
// showing an empty panel.
function renderReceiveName(name) {
  const el = document.getElementById("receive-name-display");
  if (!el) return; // dashboard not rendered yet - renderMyNameBadge runs before it in some paths
  if (name) {
    el.innerHTML = `
      <div class="receive-name-value">${displayName(name)}</div>
      <button class="btn-primary" id="receive-name-copy-btn">Copy address</button>
    `;
    document.getElementById("receive-name-copy-btn").addEventListener("click", async (e) => {
      try {
        await navigator.clipboard.writeText(displayName(name));
        e.target.textContent = "Copied!";
      } catch (err) {
        e.target.textContent = displayName(name); // clipboard blocked - show it so it can be selected/copied by hand
      }
      setTimeout(() => { e.target.textContent = "Copy address"; }, 1500);
    });
  } else {
    el.innerHTML = `<div class="message error">You haven't claimed a name yet - head to the Names tab to get one, it's free.</div>`;
  }
}

// Resolves this wallet's own .haze name for display: trusts the cached name
// if present, otherwise falls back to scanning the registry once for a
// record owned by this wallet's identity pubkey (covers names registered
// before this cache existed, or a fresh browser profile restored from a
// mnemonic). Best-effort - failures just leave the badge hidden.
async function resolveMyName() {
  const cached = loadMyName();
  if (cached) { renderMyNameBadge(cached); return; }
  renderMyNameBadge(null); // shows the Receive tab's "claim a name" prompt while resolving
  try {
    const pubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
    const records = await fetchJson("/v1/names?limit=500");
    const mine = records.find(r => bytesToHex(r.owner_pubkey) === pubkeyHex);
    if (mine) {
      saveMyName(mine.name);
      renderMyNameBadge(mine.name);
    }
  } catch (e) {
    // non-fatal, just leave the badge hidden
  }
}

// In-memory only for this session - never written back to localStorage in plaintext.
let sessionKeystoreBytes = null;

// ---------- "Send to a name" (inbox-relayed slate exchange) ----------
// Only one in-flight "send to a name" at a time - starting a second before
// the first completes would orphan its change output.
let pendingNameSend = null; // { toName, pendingSlateBytes, amount }

// ---------- Marketplace atomic-swap purchase (inbox-relayed handshake) ----------
// Only one in-flight purchase at a time, same reasoning as pendingNameSend.
// Unlike a plain send, the payment here is deliberately NOT broadcast the
// moment the seller accepts - it's held until the seller hands back a
// signed conditional transfer, so the two can be broadcast together (see
// the "signed_transfer" handling in pollInbox below). Losing this state
// (e.g. closing the tab) just means the purchase stalls, not a fund loss -
// nothing irrevocable has happened until both broadcasts below succeed.
let pendingPurchase = null; // { assetId, sellerPubkeyHex, price, pendingSlateBytes, finalizedTxJson, spentCommitmentsHex, change }
let pendingCollectionMint = null; // { assetId, collectionId, phaseIndex, creatorPubkeyHex, price, allowlistProofHex, allowlistLeafIndex, pendingSlateBytes, opJson, finalizedTxJson, spentCommitmentsHex, change }

async function fetchJson(path, opts) {
  const res = await fetch(API_BASE + path, opts);
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

// Matches core::mempool::MIN_FEE - only used if the node can't be reached
// for a live estimate, so a transaction can still be built offline-ish
// rather than blocking entirely on one extra request.
const FALLBACK_FEE = 5n;

// Fees are size-based and fixed regardless of network load (see core::mempool::
// required_fee/suggested_fee, GET /v1/fee-estimate) rather than a flat
// constant - a transaction pays for the bytes it actually takes up on-chain,
// and the network gets to say what that costs right now, instead of every
// wallet guessing the same hardcoded number regardless of size or traffic.
async function getSuggestedFee() {
  try {
    const estimate = await fetchJson("/v1/fee-estimate");
    return BigInt(estimate.suggested_fee);
  } catch (e) {
    return FALLBACK_FEE;
  }
}

// Matches core::registry::NAME_REGISTRATION_FEE - the hard consensus floor,
// used as a fallback if the node can't be reached for a live estimate.
const FALLBACK_NAME_FEE = 5n;

// Congestion-priced the same way as getSuggestedFee, just against the
// name-registration backlog instead of the payment one (see
// Mempool::suggested_name_fee / GET /v1/fee-estimate's suggested_name_fee).
async function getSuggestedNameFee() {
  try {
    const estimate = await fetchJson("/v1/fee-estimate");
    return BigInt(estimate.suggested_name_fee);
  } catch (e) {
    return FALLBACK_NAME_FEE;
  }
}

// Matches core::assets::ASSET_MINT_FEE - the hard consensus floor, used as a
// fallback if the node can't be reached for a live estimate.
const FALLBACK_ASSET_FEE = 5n;

// Congestion-priced the same way as getSuggestedNameFee, just against the
// asset-mint backlog instead (see Mempool::suggested_asset_fee /
// GET /v1/fee-estimate's suggested_asset_fee).
async function getSuggestedAssetFee() {
  try {
    const estimate = await fetchJson("/v1/fee-estimate");
    return BigInt(estimate.suggested_asset_fee);
  } catch (e) {
    return FALLBACK_ASSET_FEE;
  }
}

// ---------- UI: lock screen ----------
function renderLockScreen() {
  const app = document.getElementById("app");
  const exists = hasWallet();

  app.innerHTML = `
    <div class="panel">
      <h2>${exists ? "Unlock Wallet" : "Create Wallet"}</h2>
      <div class="sub">${exists
        ? "Enter your password to unlock the wallet stored in this browser."
        : "Generates a real keystore (via the browser's secure RNG) and encrypts it with your password before storing it in this browser."}</div>
      <label>Password</label>
      <input type="password" id="pw-input" autocomplete="${exists ? "current-password" : "new-password"}" />
      ${exists ? "" : `<label>Confirm password</label><input type="password" id="pw-confirm-input" autocomplete="new-password" />`}
      <button class="btn-primary" id="submit-btn">${exists ? "Unlock" : "Create Wallet"}</button>
      <div id="lock-message"></div>
      ${exists
        ? `<span class="toggle-link" id="reset-link">Wrong browser / start fresh instead?</span>`
        : `<span class="toggle-link" id="restore-link">Already have a recovery phrase? Restore it</span>`}
    </div>
  `;

  const message = (text, cls) => {
    document.getElementById("lock-message").innerHTML = `<div class="message ${cls}">${text}</div>`;
  };

  document.getElementById("submit-btn").addEventListener("click", async () => {
    const password = document.getElementById("pw-input").value;
    if (!password) { message("Enter a password.", "error"); return; }

    if (exists) {
      try {
        const encrypted = JSON.parse(localStorage.getItem(KEYSTORE_STORAGE_KEY));
        sessionKeystoreBytes = await decryptKeystore(password, encrypted);
        if (onboardingComplete()) {
          renderDashboard();
        } else {
          // Unlocked, but never finished picking a name (e.g. reloaded
          // mid-onboarding) - the phrase was only ever shown once and can't
          // be re-shown, so just resume at naming.
          renderNameStep();
        }
      } catch (e) {
        message("Incorrect password.", "error");
      }
    } else {
      const confirm = document.getElementById("pw-confirm-input").value;
      if (password !== confirm) { message("Passwords don't match.", "error"); return; }
      if (password.length < 8) { message("Use at least 8 characters.", "error"); return; }

      const generated = generate_keystore_with_mnemonic();
      const encrypted = await encryptKeystore(password, generated.keystore_bytes);
      localStorage.setItem(KEYSTORE_STORAGE_KEY, JSON.stringify(encrypted));
      saveWalletStoreBytes(wallet_store_new());
      sessionKeystoreBytes = generated.keystore_bytes;
      renderMnemonicStep(generated.mnemonic);
    }
  });

  const resetLink = document.getElementById("reset-link");
  if (resetLink) {
    resetLink.addEventListener("click", () => {
      if (window.confirm("This deletes the wallet stored in this browser. This cannot be undone. Continue?")) {
        localStorage.removeItem(KEYSTORE_STORAGE_KEY);
        localStorage.removeItem(STORE_STORAGE_KEY);
        localStorage.removeItem(ONBOARDING_STORAGE_KEY);
        localStorage.removeItem(ACTIVITY_STORAGE_KEY);
        clearMyName();
        renderLockScreen();
      }
    });
  }

  const restoreLink = document.getElementById("restore-link");
  if (restoreLink) {
    restoreLink.addEventListener("click", () => renderRestoreScreen());
  }
}

function renderRestoreScreen() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="panel">
      <h2>Restore from phrase</h2>
      <div class="sub">Enter your 12-word recovery phrase to restore this wallet - keys, name, and balance. This scans the whole chain for outputs only you can decrypt, so it can take a moment on a large chain.</div>
      <label>Recovery phrase</label>
      <textarea id="restore-phrase-input" placeholder="12 words, separated by spaces" style="min-height:70px;"></textarea>
      <label>New password</label>
      <input type="password" id="restore-pw-input" autocomplete="new-password" />
      <label>Confirm password</label>
      <input type="password" id="restore-pw-confirm-input" autocomplete="new-password" />
      <button class="btn-primary" id="restore-btn">Restore wallet</button>
      <div id="restore-message"></div>
      <span class="toggle-link" id="restore-back-link">Back</span>
    </div>
  `;

  document.getElementById("restore-back-link").addEventListener("click", () => renderLockScreen());

  document.getElementById("restore-btn").addEventListener("click", async () => {
    const phrase = document.getElementById("restore-phrase-input").value.trim();
    const password = document.getElementById("restore-pw-input").value;
    const confirm = document.getElementById("restore-pw-confirm-input").value;
    const messageEl = document.getElementById("restore-message");

    if (!phrase) {
      messageEl.innerHTML = `<div class="message error">Enter your recovery phrase.</div>`;
      return;
    }
    if (password !== confirm) {
      messageEl.innerHTML = `<div class="message error">Passwords don't match.</div>`;
      return;
    }
    if (password.length < 8) {
      messageEl.innerHTML = `<div class="message error">Use at least 8 characters.</div>`;
      return;
    }

    let keystoreBytes;
    try {
      keystoreBytes = restore_keystore_from_mnemonic(phrase);
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">That doesn't look like a valid recovery phrase.</div>`;
      return;
    }

    messageEl.innerHTML = `<div class="message success">Scanning the chain for your outputs&hellip;</div>`;

    try {
      const [scanRes, utxos] = await Promise.all([
        fetch(API_BASE + "/v1/scan-outputs"),
        fetchJson("/v1/utxos"),
      ]);
      if (!scanRes.ok) throw new Error("node rejected the scan request");
      const scanEntriesJson = await scanRes.text();
      const utxoHexList = utxos.map(bytesToHex);

      const result = recover_wallet_from_chain(keystoreBytes, scanEntriesJson, utxoHexList);

      const encrypted = await encryptKeystore(password, result.keystore_bytes);
      localStorage.setItem(KEYSTORE_STORAGE_KEY, JSON.stringify(encrypted));
      localStorage.setItem(STORE_STORAGE_KEY, toB64(result.store_bytes));
      localStorage.setItem(ONBOARDING_STORAGE_KEY, "true");
      sessionKeystoreBytes = result.keystore_bytes;

      messageEl.innerHTML = `<div class="message success">Recovered ${result.recovered_count} output(s) totaling ${result.recovered_balance}.</div>`;
      renderDashboard();
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });
}

// ---------- UI: onboarding wizard (mnemonic -> fund -> choose a name) ----------
// A small local wordlist for suggesting a random name, distinct from the
// on-chain reserved-word denylist (core::registry) - this is just for
// generating a pleasant-looking candidate to check availability of.
const RANDOM_NAME_ADJECTIVES = ["quiet", "swift", "amber", "hidden", "lucky", "brave", "cosmic", "silent", "golden", "wild"];
const RANDOM_NAME_NOUNS = ["falcon", "river", "ember", "comet", "cedar", "harbor", "meadow", "spark", "raven", "tide"];

function randomCandidateName() {
  const adj = RANDOM_NAME_ADJECTIVES[Math.floor(Math.random() * RANDOM_NAME_ADJECTIVES.length)];
  const noun = RANDOM_NAME_NOUNS[Math.floor(Math.random() * RANDOM_NAME_NOUNS.length)];
  const n = Math.floor(Math.random() * 900) + 100;
  return `${adj}-${noun}-${n}`;
}

// ---------- UI: dashboard ----------
async function refreshBalance() {
  try {
    const utxos = await fetchJson("/v1/utxos");
    const hexList = utxos.map(bytesToHex);
    let storeBytes = loadWalletStoreBytes();
    storeBytes = reconcile_wallet_store(storeBytes, hexList);
    saveWalletStoreBytes(storeBytes);

    const confirmed = wallet_balance(storeBytes);
    const pending = wallet_pending_balance(storeBytes);
    document.getElementById("stat-confirmed").textContent = confirmed.toString();
    document.getElementById("stat-pending").textContent = pending.toString();
    renderNodeIndicator(true);
  } catch (e) {
    renderNodeIndicator(false);
  }
}

function bytesToHex(byteArray) {
  return byteArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// The inbox relay (see src/api/inbox.rs) requires every POST to be signed
// by the wallet's identity key, binding it to the exact (recipient, kind,
// payload) - otherwise anyone could inject a message claiming to be from
// someone else. Mirrors inbox_post_signing_message on the server exactly.
async function postToInbox(toPubkeyHex, kind, payloadJson) {
  const fromPubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
  const message = `HazeInboxMessage:${toPubkeyHex}:${kind}:${payloadJson}`;
  const signatureHex = sign_identity_message(sessionKeystoreBytes, message);
  return fetch(API_BASE + "/v1/inbox/" + toPubkeyHex, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ from_pubkey_hex: fromPubkeyHex, kind, payload_json: payloadJson, signature_hex: signatureHex }),
  });
}

// Draining another wallet's inbox requires proving ownership of the pubkey
// being polled (see inbox_poll_signing_message) - otherwise anyone who
// merely knows a pubkey (they're public) could read/steal someone else's
// queued handshake messages.
async function getFromInbox(pubkeyHex) {
  const timestamp = Math.floor(Date.now() / 1000);
  const message = `HazeInboxPoll:${pubkeyHex}:${timestamp}`;
  const signatureHex = sign_identity_message(sessionKeystoreBytes, message);
  return fetch(`${API_BASE}/v1/inbox/${pubkeyHex}?timestamp=${timestamp}&signature_hex=${signatureHex}`);
}

// Links straight to the broadcast tx's kernel in the node's embedded
// explorer (served at the node's own root), instead of leaving the user
// with just a "broadcast successfully" message and no way to see it.
function explorerLinkForTx(transactionJson) {
  const tx = JSON.parse(transactionJson);
  const excessHex = bytesToHex(tx.kernels[0].excess);
  return `${API_BASE}/?q=${excessHex}`;
}

// A RegisterNameOp's "transaction" is its fee_payment sub-transaction - same
// idea as explorerLinkForTx, just one level deeper into the op JSON.
function explorerLinkForNameOp(opJson) {
  const op = JSON.parse(opJson);
  const excessHex = bytesToHex(op.fee_payment.kernels[0].excess);
  return `${API_BASE}/?q=${excessHex}`;
}

// Haze names are displayed with a ".haze" suffix (like ENS's ".eth") - purely
// cosmetic, the on-chain name itself has no dot (dots aren't in the allowed
// character set for the underlying registry).
function displayName(name) {
  return `${name}.haze`;
}

// Requires the ".haze" suffix on input (not just the bare name) so a typo'd
// or copy-pasted raw pubkey/other-chain address can't be mistaken for a
// Haze name - returns the bare on-chain name, or null if the suffix is
// missing/malformed.
function parseHazeAddress(input) {
  const trimmed = input.trim().toLowerCase();
  if (!trimmed.endsWith(".haze")) return null;
  const bare = trimmed.slice(0, -".haze".length);
  return bare.length > 0 ? bare : null;
}

// Polls GET /v1/names/:name until it's actually mined (registered_at_block
// present), instead of leaving a static "queued" message forever - blocks
// take real time here (~1s), same as every other action in this wallet, but
// there's no reason not to surface confirmation the moment it lands.
async function pollForNameConfirmation(name, onConfirmed, { intervalMs = 3000, timeoutMs = 90000, isConfirmed = () => true } = {}) {
  const start = Date.now();
  while (Date.now() - start < timeoutMs) {
    await new Promise(r => setTimeout(r, intervalMs));
    try {
      const res = await fetch(API_BASE + "/v1/names/" + encodeURIComponent(name));
      if (res.ok) {
        const record = await res.json();
        if (isConfirmed(record)) {
          onConfirmed(record);
          return;
        }
      }
    } catch (e) {
      // keep polling - a transient fetch failure shouldn't abort confirmation
    }
  }
}

// Same idea as pollForNameConfirmation, polling GET /v1/assets/:id instead
// (minted_at_block present once mined).
async function pollForAssetConfirmation(assetId, onConfirmed, { intervalMs = 3000, timeoutMs = 90000, isConfirmed = () => true } = {}) {
  const start = Date.now();
  while (Date.now() - start < timeoutMs) {
    await new Promise(r => setTimeout(r, intervalMs));
    try {
      const res = await fetch(API_BASE + "/v1/assets/" + encodeURIComponent(assetId));
      if (res.ok) {
        const record = await res.json();
        if (isConfirmed(record)) {
          onConfirmed(record);
          return;
        }
      }
    } catch (e) {
      // keep polling - a transient fetch failure shouldn't abort confirmation
    }
  }
}

// A marketplace conditional transfer (required_kernel_excess set) is
// rejected outright by handle_transfer_asset - never queued into the
// mempool at all - until its referenced payment kernel is actually visible
// on-chain (see api::assets::handle_transfer_asset's early 409 check).
// Passively watching for confirmation isn't enough here: nothing ever
// resubmits the transfer op on its own, so this actively re-POSTs it until
// the node accepts it (payment confirmed) or the timeout elapses.
async function retrySubmitAssetTransfer(opJson, assetId, onConfirmed, onGaveUp, { intervalMs = 3000, timeoutMs = 90000, endpoint = "/v1/assets/transfer" } = {}) {
  const start = Date.now();
  while (Date.now() - start < timeoutMs) {
    try {
      const res = await fetch(API_BASE + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: opJson,
      });
      if (res.ok) {
        onConfirmed();
        return;
      }
    } catch (e) {
      // transient - keep retrying
    }
    await new Promise(r => setTimeout(r, intervalMs));
  }
  onGaveUp();
}

// ---------- marketplace deep-link handoff ----------
// The standalone marketplace site (haze-marketplace-web) never touches this
// wallet's keys - it hands off "connect"/"list"/"buy" requests via a plain
// URL, this wallet shows exactly what's being asked for and requires an
// explicit click before signing/broadcasting anything, then redirects back
// to return_url with the result. Called once per render right after unlock
// (renderDashboard), since these actions need sessionKeystoreBytes.
function handleMarketplaceDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const action = params.get("action");
  const returnUrl = params.get("return_url");
  if (!action || !returnUrl) return;
  let origin;
  try { origin = new URL(returnUrl).origin; } catch (e) { return; }

  const banner = document.createElement("div");
  banner.className = "panel";
  banner.style.cssText = "margin: 0 auto 24px; border-color: var(--amber);";
  document.getElementById("app").prepend(banner);
  const deny = () => banner.remove();

  if (action === "connect") {
    const nonce = params.get("nonce") || "";
    banner.innerHTML = `
      <h2>Connect to marketplace?</h2>
      <div class="sub"><strong>${origin}</strong> wants to verify you control this wallet's identity pubkey. Nothing is signed except this proof - no funds or assets move.</div>
      <button class="btn-primary" id="dl-approve">Approve</button>
      <button class="btn-ghost btn-small" id="dl-deny" style="margin-left:8px;">Deny</button>
    `;
    banner.querySelector("#dl-approve").addEventListener("click", () => {
      try {
        const pubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
        const signatureHex = sign_identity_message(sessionKeystoreBytes, nonce);
        const sep = returnUrl.includes("?") ? "&" : "?";
        window.location.href = `${returnUrl}${sep}connected_pubkey=${pubkeyHex}&nonce=${encodeURIComponent(nonce)}&signature=${signatureHex}`;
      } catch (e) {
        banner.innerHTML = `<div class="message error">${e.message || e}</div>`;
      }
    });
    banner.querySelector("#dl-deny").addEventListener("click", deny);
  } else if (action === "list") {
    const assetId = params.get("asset_id") || "";
    const price = params.get("price") || "";
    banner.innerHTML = `
      <h2>List asset for sale?</h2>
      <div class="sub"><strong>${origin}</strong> is asking you to publicly list <strong>${assetId}</strong> for <strong>${price}</strong>. Costs nothing, not irrevocable - you can cancel any time.</div>
      <button class="btn-primary" id="dl-approve">Approve &amp; list</button>
      <button class="btn-ghost btn-small" id="dl-deny" style="margin-left:8px;">Deny</button>
      <div id="dl-message"></div>
    `;
    banner.querySelector("#dl-approve").addEventListener("click", async () => {
      const msgEl = banner.querySelector("#dl-message");
      try {
        const listedAt = BigInt(Math.floor(Date.now() / 1000));
        const listingJson = build_create_listing_request(sessionKeystoreBytes, assetId, BigInt(price), listedAt);
        const res = await fetch(API_BASE + "/v1/marketplace/list", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: listingJson,
        });
        if (!res.ok) {
          const errJson = await res.json().catch(() => ({}));
          msgEl.innerHTML = `<div class="message error">${errJson.error || res.status}</div>`;
          return;
        }
        const sep = returnUrl.includes("?") ? "&" : "?";
        window.location.href = `${returnUrl}${sep}listed=1&asset_id=${encodeURIComponent(assetId)}`;
      } catch (e) {
        msgEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
      }
    });
    banner.querySelector("#dl-deny").addEventListener("click", deny);
  } else if (action === "cancel_listing") {
    const assetId = params.get("asset_id") || "";
    banner.innerHTML = `
      <h2>Cancel this listing?</h2>
      <div class="sub"><strong>${origin}</strong> is asking you to withdraw your listing for <strong>${assetId}</strong>.</div>
      <button class="btn-primary" id="dl-approve">Approve &amp; cancel</button>
      <button class="btn-ghost btn-small" id="dl-deny" style="margin-left:8px;">Deny</button>
      <div id="dl-message"></div>
    `;
    banner.querySelector("#dl-approve").addEventListener("click", async () => {
      const msgEl = banner.querySelector("#dl-message");
      try {
        const cancelJson = build_cancel_listing_request(sessionKeystoreBytes, assetId);
        const res = await fetch(API_BASE + "/v1/marketplace/cancel", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: cancelJson,
        });
        if (!res.ok) {
          const errJson = await res.json().catch(() => ({}));
          msgEl.innerHTML = `<div class="message error">${errJson.error || res.status}</div>`;
          return;
        }
        const sep = returnUrl.includes("?") ? "&" : "?";
        window.location.href = `${returnUrl}${sep}cancelled=1&asset_id=${encodeURIComponent(assetId)}`;
      } catch (e) {
        msgEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
      }
    });
    banner.querySelector("#dl-deny").addEventListener("click", deny);
  } else if (action === "buy") {
    const assetId = params.get("asset_id") || "";
    const sellerPubkeyHex = (params.get("seller_pubkey") || "").toLowerCase();
    const price = params.get("price") || "";
    banner.innerHTML = `
      <h2>Buy this asset?</h2>
      <div class="sub"><strong>${origin}</strong> is asking you to buy <strong>${assetId}</strong> for <strong>${price}</strong> from <span class="keystore-note">${sellerPubkeyHex}</span>. Trustless - your payment and the transfer are cryptographically linked, so neither side can be scammed.</div>
      <button class="btn-primary" id="dl-approve">Approve &amp; buy</button>
      <button class="btn-ghost btn-small" id="dl-deny" style="margin-left:8px;">Deny</button>
      <div id="dl-message"></div>
    `;
    banner.querySelector("#dl-approve").addEventListener("click", async () => {
      const msgEl = banner.querySelector("#dl-message");
      if (pendingPurchase) {
        msgEl.innerHTML = `<div class="message error">A purchase is already in progress - wait for it to finish first.</div>`;
        return;
      }
      try {
        // If the asset came from a collection that charges a royalty, the
        // price splits into two independent trustless payments: one to the
        // seller, one to the collection's original creator - see
        // core::assets::TransferAssetOp::required_royalty_kernel_excess.
        // Both are ordinary two-party interactive sends run in parallel;
        // the transfer itself won't apply until BOTH kernels exist.
        let royaltyPubkeyHex = null;
        let royaltyAmount = 0n;
        try {
          const asset = await fetchJson(`/v1/assets/${encodeURIComponent(assetId)}`);
          if (asset.collection_id) {
            const collection = await fetchJson(`/v1/collections/${encodeURIComponent(asset.collection_id)}`);
            if (collection.royalty_bps > 0) {
              royaltyPubkeyHex = bytesToHex(collection.creator_pubkey);
              royaltyAmount = (BigInt(price) * BigInt(collection.royalty_bps)) / 10000n;
            }
          }
        } catch (e) { /* asset/collection lookup failing just means no royalty is applied */ }
        const sellerAmount = BigInt(price) - royaltyAmount;

        const storeBytes = loadWalletStoreBytes();
        const fee = await getSuggestedFee();
        const sellerSlate = create_send_slate(sessionKeystoreBytes, storeBytes, sellerAmount, fee);
        sessionKeystoreBytes = sellerSlate.updated_keystore_bytes;
        await postToInbox(sellerPubkeyHex, "request", sellerSlate.slate_json);

        let royaltySlate = null;
        if (royaltyPubkeyHex && royaltyAmount > 0n) {
          // The seller slate above already picked its inputs (fixed at
          // create_send_slate time, before any interactive response - see
          // pending_slate_reservation's doc comment), but hasn't been
          // committed to the store yet (that only happens once the seller
          // actually accepts, in the "response" handler below). Without
          // eagerly reserving it here first, this second, independent slate
          // could select the exact same commitment - the same UTXO-collision
          // class of bug already hit once this session for collection mints.
          const reservation = pending_slate_reservation(sellerSlate.pending_slate_bytes);
          let storeBytes2 = loadWalletStoreBytes();
          storeBytes2 = commit_slate_send(storeBytes2, reservation.spent_commitments_hex, reservation.change);
          saveWalletStoreBytes(storeBytes2);

          royaltySlate = create_send_slate(sessionKeystoreBytes, storeBytes2, royaltyAmount, fee);
          sessionKeystoreBytes = royaltySlate.updated_keystore_bytes;
          await postToInbox(royaltyPubkeyHex, "request", royaltySlate.slate_json);
        }

        pendingPurchase = {
          assetId, sellerPubkeyHex, price: price.toString(), returnUrl,
          pendingSlateBytes: sellerSlate.pending_slate_bytes,
          // royaltyPubkeyHex is kept even when royaltySlate ends up null (a
          // nonzero royalty_bps that rounds down to a 0 royaltyAmount on a
          // cheap enough price), but hasRoyaltyLeg is the one true signal
          // for "a second slate/payment actually exists for this purchase" -
          // every other branch below (royaltyDone, the eager seller-leg
          // reservation, the redundant-commit guard, the royalty broadcast)
          // must key off THIS, not off royaltyPubkeyHex alone, or a
          // rounds-to-zero royalty deadlocks waiting for a response that
          // was never requested.
          royaltyPubkeyHex, royaltyAmount: royaltyAmount.toString(),
          hasRoyaltyLeg: !!royaltySlate,
          pendingRoyaltySlateBytes: royaltySlate ? royaltySlate.pending_slate_bytes : null,
          sellerDone: false, royaltyDone: !royaltySlate,
        };
        banner.querySelector("#dl-approve").disabled = true;
        msgEl.innerHTML = `<div class="message success">Offer sent - waiting for ${royaltyPubkeyHex ? "the seller and the creator" : "the seller"} to accept. You'll be redirected back to ${origin} once the purchase completes.</div>`;
      } catch (e) {
        msgEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
      }
    });
    banner.querySelector("#dl-deny").addEventListener("click", deny);
  } else if (action === "launch_collection") {
    const collectionId = params.get("collection_id") || "";
    const name = params.get("name") || "";
    const symbol = params.get("symbol") || "";
    const metadata = params.get("metadata") || "";
    const royaltyBps = parseInt(params.get("royalty_bps") || "0", 10);
    let phases = [];
    try { phases = JSON.parse(params.get("phases") || "[]"); } catch (e) { phases = []; }
    banner.innerHTML = `
      <h2>Launch a collection?</h2>
      <div class="sub"><strong>${origin}</strong> is asking you to launch <strong>${name}</strong> (${symbol}, id "${collectionId}") with ${phases.length} round(s)${royaltyBps > 0 ? ` and a ${(royaltyBps / 100).toFixed(2)}% secondary-sale royalty paid to you` : ""}. Costs nothing to launch; each round's price is paid by minters directly to you, trustlessly.</div>
      <button class="btn-primary" id="dl-approve">Approve &amp; launch</button>
      <button class="btn-ghost btn-small" id="dl-deny" style="margin-left:8px;">Deny</button>
      <div id="dl-message"></div>
    `;
    banner.querySelector("#dl-approve").addEventListener("click", async () => {
      const msgEl = banner.querySelector("#dl-message");
      try {
        // Each round's plaintext allowlist (if any) is stripped out of the
        // on-chain phase record - only its Merkle root goes on-chain, the
        // list itself is published separately (see core::allowlist), same
        // gossip-not-consensus split core::marketplace::Listing uses.
        const phaseAllowlists = []; // [{ phaseIndex, pubkeysHex }]
        const onChainPhases = phases.map((p, i) => {
          let allowlist_merkle_root = null;
          const pubkeysHex = (p.allowlist_pubkeys_hex || []).filter(Boolean);
          if (pubkeysHex.length > 0) {
            const proof = compute_allowlist_merkle_proof(pubkeysHex, pubkeysHex[0]);
            allowlist_merkle_root = proof.root_hex.match(/.{1,2}/g).map(h => parseInt(h, 16));
            phaseAllowlists.push({ phaseIndex: i, pubkeysHex });
          }
          return { name: p.name, start_time: p.start_time, end_time: p.end_time, price: p.price, per_wallet_limit: p.per_wallet_limit, allowlist_merkle_root };
        });

        const opJson = build_launch_collection_request(sessionKeystoreBytes, collectionId, name, symbol, metadata, JSON.stringify(onChainPhases), royaltyBps);
        const res = await fetch(API_BASE + "/v1/collections/launch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: opJson,
        });
        if (!res.ok) {
          const errJson = await res.json().catch(() => ({}));
          msgEl.innerHTML = `<div class="message error">Node rejected launch: ${errJson.error || res.status}</div>`;
          return;
        }

        for (const { phaseIndex, pubkeysHex } of phaseAllowlists) {
          const publishedAt = Math.floor(Date.now() / 1000);
          const entryJson = sign_allowlist_publish(sessionKeystoreBytes, collectionId, phaseIndex, pubkeysHex, publishedAt);
          await fetch(API_BASE + `/v1/collections/${encodeURIComponent(collectionId)}/phases/${phaseIndex}/allowlist`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: entryJson,
          });
        }

        pushActivity({ type: "collection_launched", title: `Launched ${name}`, detail: collectionId });
        const sep = returnUrl.includes("?") ? "&" : "?";
        window.location.href = `${returnUrl}${sep}launched=1&collection_id=${encodeURIComponent(collectionId)}`;
      } catch (e) {
        msgEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
      }
    });
    banner.querySelector("#dl-deny").addEventListener("click", deny);
  } else if (action === "mint_collection") {
    const collectionId = params.get("collection_id") || "";
    const phaseIndex = parseInt(params.get("phase_index") || "0", 10);
    banner.innerHTML = `
      <h2>Mint from this drop?</h2>
      <div class="sub">Loading round details&hellip;</div>
    `;
    (async () => {
      try {
        const collection = await fetchJson(`/v1/collections/${encodeURIComponent(collectionId)}`);
        const phase = collection.phases[phaseIndex];
        if (!phase) {
          banner.querySelector(".sub").textContent = "This round no longer exists.";
          return;
        }
        banner.innerHTML = `
          <h2>Mint from this drop?</h2>
          <div class="sub"><strong>${origin}</strong> is asking you to mint from <strong>${collection.name}</strong>'s <strong>${phase.name}</strong> round for <strong>${phase.price}</strong>. Trustless - your payment only unlocks the mint once it's actually on-chain.</div>
          <button class="btn-primary" id="dl-approve">Approve &amp; mint</button>
          <button class="btn-ghost btn-small" id="dl-deny" style="margin-left:8px;">Deny</button>
          <div id="dl-message"></div>
        `;
        banner.querySelector("#dl-approve").addEventListener("click", async () => {
          const msgEl2 = banner.querySelector("#dl-message");
          if (pendingCollectionMint) {
            msgEl2.innerHTML = `<div class="message error">A mint is already in progress - wait for it to complete first.</div>`;
            return;
          }
          try {
            const creatorPubkeyHex = bytesToHex(collection.creator_pubkey);
            const myPubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);

            let allowlistProofHex = null;
            let allowlistLeafIndex = null;
            if (phase.allowlist_merkle_root) {
              const entry = await fetchJson(`/v1/collections/${encodeURIComponent(collectionId)}/phases/${phaseIndex}/allowlist`);
              const pubkeysHex = entry.pubkeys.map(bytesToHex);
              if (!pubkeysHex.includes(myPubkeyHex)) {
                msgEl2.innerHTML = `<div class="message error">You're not on this round's allowlist.</div>`;
                return;
              }
              const proof = compute_allowlist_merkle_proof(pubkeysHex, myPubkeyHex);
              allowlistProofHex = proof.proof_hex;
              allowlistLeafIndex = proof.leaf_index;
            }

            const assetId = `${collectionId}-${Date.now().toString(36)}`;
            const storeBytes = loadWalletStoreBytes();
            const fee = await getSuggestedFee();
            const price = BigInt(phase.price);
            if (price <= 0n) {
              // A free round has no payment to exchange - required_kernel_excess
              // stays unset (this project's mint gate always requires the
              // creator's own approval regardless of price, so the creator
              // still needs to co-sign; it just isn't conditioned on any
              // kernel). Not supported by this UI yet.
              msgEl2.innerHTML = `<div class="message error">Free rounds aren't supported yet.</div>`;
              return;
            }
            const slate = create_send_slate(sessionKeystoreBytes, storeBytes, price, fee);
            sessionKeystoreBytes = slate.updated_keystore_bytes;

            pendingCollectionMint = {
              assetId, collectionId, phaseIndex, creatorPubkeyHex, price: phase.price.toString(),
              metadata: `Minted from ${collection.name}`,
              allowlistProofHex, allowlistLeafIndex, pendingSlateBytes: slate.pending_slate_bytes,
              returnUrl,
            };

            await postToInbox(creatorPubkeyHex, "request", slate.slate_json);
            banner.querySelector("#dl-approve").disabled = true;
            msgEl2.innerHTML = `<div class="message success">Offer sent for "${assetId}" - waiting for the creator to accept. You'll be redirected back to ${origin} once the mint completes.</div>`;
          } catch (e) {
            msgEl2.innerHTML = `<div class="message error">${e.message || e}</div>`;
            pendingCollectionMint = null;
          }
        });
        banner.querySelector("#dl-deny").addEventListener("click", deny);
      } catch (e) {
        banner.querySelector(".sub").textContent = e.message || String(e);
      }
    })();
  } else {
    banner.remove();
  }
}

  function activateTab(tab) {
    document.querySelectorAll(".tab-panel").forEach((el) => el.classList.toggle("active", el.dataset.tab === tab));

    btn.addEventListener("click", () => activateTab(btn.dataset.goto));

  document.getElementById("stake-btn").addEventListener("click", async () => {

      const res = await fetch(API_BASE + "/v1/stake", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: requestJson,
      });

      if (!res.ok) {
        const text = await res.text();
        messageEl.innerHTML = `<div class="message error">Node rejected stake: ${text}</div>`;
        return;
      }

      messageEl.innerHTML = `<div class="message success">Registered as a validator. It'll show up in the explorer's validator count. It won't actually propose blocks until you run a node with its key - see below.</div>`;

      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;

  // this derives the same staking key reveal-key-link shows, uses it to scan
  // for and sweep every unspent reward this wallet's validator identity has
  // earned into a normal, spendable output in this same wallet.
  document.getElementById("sweep-rewards-btn").addEventListener("click", async () => {
    const messageEl = document.getElementById("sweep-rewards-message");
    const btn = document.getElementById("sweep-rewards-btn");
    btn.disabled = true;
    messageEl.innerHTML = `<div class="message success">Scanning the chain for unswept rewards&hellip;</div>`;

    try {
      const storeBytes = loadWalletStoreBytes();
      const stakeKeyHex = reveal_stake_blinding_hex(sessionKeystoreBytes, storeBytes, 1n);

      const [scanRes, utxos, fee] = await Promise.all([
        fetch(API_BASE + "/v1/scan-outputs"),
        fetchJson("/v1/utxos"),
        getSuggestedFee(),
      ]);
      if (!scanRes.ok) throw new Error("node rejected the scan request");
      const scanEntriesJson = await scanRes.text();
      const utxoHexList = utxos.map(bytesToHex);

      const result = sweep_validator_rewards(stakeKeyHex, scanEntriesJson, utxoHexList, sessionKeystoreBytes, fee);

      const res = await fetch(API_BASE + "/v1/transactions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: result.transaction_json,
      });
      if (!res.ok) {
        const text = await res.text();
        messageEl.innerHTML = `<div class="message error">Node rejected transaction: ${text}</div>`;
        return;
      }

      sessionKeystoreBytes = result.updated_keystore_bytes;
      const updatedStoreBytes = commit_send(storeBytes, [], result.dest, null);
      saveWalletStoreBytes(updatedStoreBytes);

      const link = explorerLinkForTx(result.transaction_json);
      messageEl.innerHTML = `<div class="message success">Recovered ${result.swept_count} reward(s) totaling ${result.swept_total}. Balance will update once mined. <a href="${link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">View on explorer &rarr;</a></div>`;
      pushActivity({ type: "received", title: `Recovered ${result.swept_total} in validator rewards`, detail: `${result.swept_count} block(s)` });
      await refreshBalance();
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    } finally {
      btn.disabled = false;
    }

  // ---------- Rotate seed phrase ----------
  // There's no "account" to re-key here the way there would be on an
  // account-based chain - owning a coin means knowing its blinding factor,
  // derived from the seed that sealed it. "Replacing" a seed is therefore a
  // real on-chain sweep: spend everything into fresh outputs owned by a
  // brand-new seed, in one transaction (see rotate_seed_transaction).
  document.getElementById("rotate-seed-start-btn").addEventListener("click", () => {
    const storeBytes = loadWalletStoreBytes();
    const balance = wallet_balance(storeBytes);
    if (balance <= 0n) {
      document.getElementById("rotate-seed-flow").innerHTML = `<div class="message error">No confirmed balance to move - nothing to rotate yet.</div>`;
      return;
    }
    if (!window.confirm("This creates a new recovery phrase and moves your entire balance to it in one transaction. Your current phrase will no longer control these funds afterward. Continue?")) {
      return;
    }
    renderRotateSeedMnemonicStep();
  });

  function renderRotateSeedMnemonicStep() {
    const generated = generate_keystore_with_mnemonic();
    const flow = document.getElementById("rotate-seed-flow");
    flow.innerHTML = `
      <div class="sub" style="margin-top:14px;">Save this NEW recovery phrase - it's the only way to recover your funds after rotation.</div>

      </label>
      <button class="btn-primary" id="rotate-execute-btn" disabled>Move my funds to the new phrase</button>
      <div id="rotate-seed-message"></div>
    `;
    const checkbox = document.getElementById("rotate-mnemonic-confirm-check");
    const execBtn = document.getElementById("rotate-execute-btn");
    checkbox.addEventListener("change", () => { execBtn.disabled = !checkbox.checked; });
    execBtn.addEventListener("click", () => executeRotateSeed(generated));
  }

  async function executeRotateSeed(generated) {
    const messageEl = document.getElementById("rotate-seed-message");
    const execBtn = document.getElementById("rotate-execute-btn");
    execBtn.disabled = true;
    messageEl.innerHTML = `<div class="message success">Building transaction&hellip;</div>`;

    try {
      const storeBytes = loadWalletStoreBytes();
      const fee = await getSuggestedFee();
      const result = rotate_seed_transaction(sessionKeystoreBytes, storeBytes, generated.keystore_bytes, fee);

      const res = await fetch(API_BASE + "/v1/transactions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: result.transaction_json,
      });
      if (!res.ok) {
        const text = await res.text();
        messageEl.innerHTML = `<div class="message error">Node rejected transaction: ${text}</div>`;
        execBtn.disabled = false;
        return;
      }

      // Best-effort: also hand the .haze name (if any) to the new identity,
      // so it doesn't keep pointing at a wallet that's about to be
      // abandoned. Doesn't block the rotation itself - funds have already
      // moved by this point regardless of whether this succeeds.
      const myName = loadMyName();
      if (myName) {
        try {
          const newPubkeyHex = wallet_identity_pubkey_hex(generated.keystore_bytes);
          const transferJson = build_transfer_name_request(sessionKeystoreBytes, myName, newPubkeyHex, newPubkeyHex);
          await fetch(API_BASE + "/v1/names/transfer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: transferJson,
          });
        } catch (e) {
          // Non-fatal - see comment above.
        }
      }

      const password = window.prompt("Set a password to encrypt your new wallet in this browser (can be the same as before):");
      if (!password) {
        messageEl.innerHTML = `<div class="message error">Your funds are moving on-chain to the new phrase, but this browser still needs a password to save it. Refresh and use "Restore from phrase" with the recovery phrase above to finish.</div>`;
        return;
      }

      const newStoreBytes = commit_send(wallet_store_new(), [], result.dest, null);
      const encrypted = await encryptKeystore(password, generated.keystore_bytes);
      localStorage.setItem(KEYSTORE_STORAGE_KEY, JSON.stringify(encrypted));
      saveWalletStoreBytes(newStoreBytes);
      sessionKeystoreBytes = generated.keystore_bytes;

      const link = explorerLinkForTx(result.transaction_json);
      pushActivity({ type: "sent", title: "Rotated to a new seed phrase", detail: "Moved balance to a new wallet" });
      messageEl.innerHTML = `<div class="message success">Done - your funds are moving to the new phrase now (confirms shortly). <a href="${link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">View on explorer &rarr;</a></div>`;
      await refreshBalance();
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
      execBtn.disabled = false;
    }
  }
