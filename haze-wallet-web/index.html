<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Haze &mdash; Wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,340..600&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --fog-0: oklch(0.15 0.014 292);
    --fog-1: oklch(0.19 0.016 292);
    --fog-2: oklch(0.24 0.018 292);
    --fog-3: oklch(0.32 0.02 292);
    --mist: oklch(0.68 0.05 285);
    --ink: oklch(0.93 0.012 90);
    --ink-dim: oklch(0.93 0.012 90 / 0.62);
    --ink-faint: oklch(0.93 0.012 90 / 0.34);
    --amber: oklch(0.78 0.15 70);
    --amber-dim: oklch(0.78 0.15 70 / 0.16);
    --ok: oklch(0.75 0.14 155);
    --danger: oklch(0.7 0.16 25);
    --font-display: "Fraunces", serif;
    --font-body: "Public Sans", sans-serif;
    --font-mono: "IBM Plex Mono", monospace;
  }

  * { box-sizing: border-box; }

  body {
    background:
      radial-gradient(ellipse 900px 500px at 12% -10%, oklch(0.26 0.03 296 / 0.55), transparent),
      radial-gradient(ellipse 700px 500px at 100% 10%, oklch(0.22 0.03 70 / 0.12), transparent),
      var(--fog-0);
    color: var(--ink);
    font-family: var(--font-body);
    margin: 0;
    min-height: 100vh;
    padding: clamp(16px, 4vw, 44px) clamp(16px, 5vw, 64px) 110px;
  }

  .topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: clamp(28px, 4vw, 48px);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark { font-family: var(--font-display); font-size: 30px; font-style: italic; font-weight: 480; color: var(--amber); line-height: 1; }
  .brand-name { font-family: var(--font-display); font-optical-sizing: auto; font-weight: 460; font-size: clamp(26px, 3vw, 34px); letter-spacing: -0.01em; line-height: 1; }
  .brand-tag {
    display: flex;
    align-items: center;
    height: 22px;
    font-size: 12.5px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    padding-left: 14px;
    border-left: 1px solid var(--fog-3);
  }

  .node-indicator {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-faint);
    background: var(--fog-1);
    border: 1px solid var(--fog-3);
    border-radius: 3px;
    padding: 7px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .node-indicator .node-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); flex-shrink: 0; }
  .node-indicator .node-dot.online { background: var(--ok); box-shadow: 0 0 0 3px oklch(0.75 0.14 155 / 0.15); }
  .node-indicator .node-dot.offline { background: var(--danger); box-shadow: 0 0 0 3px oklch(0.7 0.16 25 / 0.15); }

  .panel {
    max-width: 480px;
    background: var(--fog-1);
    border: 1px solid var(--fog-3);
    border-radius: 6px;
    padding: clamp(24px, 4vw, 36px);
  }
  .panel h2 { font-family: var(--font-display); font-weight: 460; font-size: 22px; margin: 0 0 6px; }
  .panel .sub { color: var(--ink-faint); font-size: 13.5px; margin-bottom: 22px; line-height: 1.5; }

  label { display: block; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint); margin: 16px 0 6px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%;
    background: var(--fog-2);
    border: 1px solid var(--fog-3);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 14px;
    border-radius: 3px;
    padding: 12px 14px;
    outline: none;
  }
  input:focus { border-color: var(--mist); }
  textarea {
    width: 100%;
    background: var(--fog-2);
    border: 1px solid var(--fog-3);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 12px;
    border-radius: 3px;
    padding: 12px 14px;
    outline: none;
    resize: vertical;
    min-height: 84px;
  }
  textarea:focus { border-color: var(--mist); }

  button {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    border-radius: 999px;
    padding: 13px 24px;
    border: none;
    cursor: pointer;
    margin-top: 18px;
  }
  .btn-primary { background: var(--amber); color: var(--fog-0); width: 100%; }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-ghost { background: transparent; color: var(--ink-dim); border: 1px solid var(--fog-3); }
  .btn-ghost:hover { color: var(--ink); border-color: var(--mist); }
  .btn-small { padding: 9px 18px; font-size: 12.5px; margin-top: 0; }

  .toggle-link { color: var(--mist); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; font-size: 13px; margin-top: 14px; display: inline-block; }

  .message { font-size: 13px; padding: 10px 14px; border-radius: 3px; margin-top: 14px; }
  .message.error { background: oklch(0.7 0.16 25 / 0.12); color: oklch(0.85 0.1 25); border: 1px solid oklch(0.7 0.16 25 / 0.3); }
  .message.success { background: oklch(0.75 0.14 155 / 0.12); color: oklch(0.85 0.1 155); border: 1px solid oklch(0.75 0.14 155 / 0.3); }

  .dashboard { display: grid; gap: 24px; max-width: 620px; }
  .stat-row { display: flex; gap: clamp(24px, 4vw, 52px); flex-wrap: wrap; padding-bottom: 20px; border-bottom: 1px solid var(--fog-2); }
  .stat-item .stat-label { font-size: 11.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
  .stat-item .stat-value { font-family: var(--font-display); font-size: 36px; font-weight: 460; font-variant-numeric: tabular-nums; }
  .stat-item .stat-value.accent { color: var(--amber); }

  .action-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .keystore-note { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); word-break: break-all; margin-top: 4px; }

  .receive-name-value {
    font-family: var(--font-display);
    font-size: clamp(26px, 5vw, 34px);
    font-weight: 460;
    color: var(--amber);
    text-align: center;
    padding: 22px 12px;
    background: var(--fog-2);
    border: 1px solid var(--fog-3);
    border-radius: 6px;
    margin-bottom: 18px;
    word-break: break-word;
  }

  .inbox-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--fog-2); }
  .inbox-item:last-child { border-bottom: none; }
  .inbox-item .inbox-item-text { font-size: 13.5px; }
  .inbox-item .inbox-item-from { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); word-break: break-all; }
  .inbox-item button { margin-top: 0; flex-shrink: 0; }

  /* ---------- tabbed dashboard + floating glass bottom nav ---------- */
  .tab-panel { display: none; }
  .tab-panel.active { display: grid; gap: 24px; animation: tab-in 0.18s ease-out; }
  @keyframes tab-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .bottom-nav {
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    gap: 2px;
    padding: 6px;
    border-radius: 999px;
    background: oklch(0.22 0.02 292 / 0.55);
    backdrop-filter: blur(22px) saturate(170%);
    -webkit-backdrop-filter: blur(22px) saturate(170%);
    border: 1px solid oklch(1 0 0 / 0.09);
    box-shadow: 0 12px 36px oklch(0 0 0 / 0.4), inset 0 1px 0 oklch(1 0 0 / 0.07);
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    width: 50px;
    padding: 9px 2px 8px;
    border-radius: 999px;
    background: transparent;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    margin: 0;
    transition: background 0.16s ease, color 0.16s ease;
  }
  .nav-item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; display: block; }
  .nav-item .nav-label { font-family: var(--font-body); font-size: 8.5px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
  .nav-item:hover { color: var(--ink); }
  .nav-item.active { background: var(--amber-dim); color: var(--amber); }
  .nav-item.active svg { stroke: var(--amber); }

  /* ---------- home-screen quick actions (Trust Wallet/MetaMask style) ---------- */
  .quick-actions { display: flex; gap: clamp(10px, 3vw, 20px); }
  .quick-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: none;
    color: var(--ink-dim);
    cursor: pointer;
    margin: 0;
    padding: 0;
    flex: 1;
  }
  .quick-action .quick-action-circle {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--fog-1);
    border: 1px solid var(--fog-3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.16s ease, border-color 0.16s ease;
  }
  .quick-action svg { width: 20px; height: 20px; stroke: var(--amber); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .quick-action .quick-action-label { font-size: 11.5px; font-weight: 600; color: var(--ink-dim); }
  .quick-action:hover .quick-action-circle { background: var(--amber-dim); border-color: var(--amber); }

  /* ---------- history / activity log ---------- */
  .activity-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--fog-2); }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--fog-2);
  }
  .activity-icon svg { width: 16px; height: 16px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .activity-icon.in { background: oklch(0.75 0.14 155 / 0.14); }
  .activity-icon.in svg { stroke: var(--ok); }
  .activity-icon.out { background: var(--amber-dim); }
  .activity-icon.out svg { stroke: var(--amber); }
  .activity-icon.meta { background: oklch(0.68 0.05 285 / 0.16); }
  .activity-icon.meta svg { stroke: var(--mist); }
  .activity-body { flex: 1; min-width: 0; }
  .activity-title { font-size: 13.5px; font-weight: 600; }
  .activity-detail { font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); word-break: break-all; margin-top: 2px; }
  .activity-time { font-size: 11px; color: var(--ink-faint); flex-shrink: 0; white-space: nowrap; }
  .activity-empty { color: var(--ink-faint); font-size: 13.5px; padding: 12px 0; }

  ::selection { background: var(--amber-dim); }
</style>

<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">&#9686;</span>
      <span class="brand-name">Haze</span>
      <span class="brand-tag">wallet</span>
      <span class="brand-tag" id="my-name-badge" style="display:none;"></span>
    </div>
    <div class="node-indicator" id="node-indicator" title="Click to change the Haze node this wallet talks to">
      <span class="node-dot" id="node-dot"></span>
      <span id="node-label">&mdash;</span>
    </div>
  </header>

  <main id="app"></main>

<script type="module">
import init, {
  generate_keystore, wallet_store_new, reconcile_wallet_store,
  wallet_balance, wallet_pending_balance, plan_send, commit_send,
  create_send_slate, respond_to_slate, finalize_slate, commit_receive, commit_slate_send,
  build_stake_request, reveal_stake_blinding_hex,
  build_register_name_request, commit_register_name, wallet_identity_pubkey_hex,
  build_sponsored_register_name_request,
  build_transfer_name_request,
  generate_keystore_with_mnemonic, restore_keystore_from_mnemonic,
  recover_wallet_from_chain, sweep_validator_rewards
} from './pkg/haze_core.js';

// ---------- Node API base (same convention as the explorer) ----------
const DEFAULT_API_BASE = "http://localhost:8332";
const API_STORAGE_KEY = "hazeApiBase";

function resolveApiBase() {
  const params = new URLSearchParams(window.location.search);
  const fromQuery = params.get("api");
  if (fromQuery) {
    localStorage.setItem(API_STORAGE_KEY, fromQuery);
    return fromQuery.replace(/\/+$/, "");
  }
  const saved = localStorage.getItem(API_STORAGE_KEY);
  if (saved) return saved.replace(/\/+$/, "");
  return DEFAULT_API_BASE;
}
let API_BASE = resolveApiBase();

function renderNodeIndicator(online) {
  document.getElementById("node-label").textContent = API_BASE;
  document.getElementById("node-dot").className = "node-dot " + (online ? "online" : "offline");
}
document.getElementById("node-indicator").addEventListener("click", () => {
  const next = window.prompt("Haze node API URL:", API_BASE);
  if (next && next.trim()) {
    API_BASE = next.trim().replace(/\/+$/, "");
    localStorage.setItem(API_STORAGE_KEY, API_BASE);
    renderNodeIndicator(false);
    refreshBalance();
  }
});

// ---------- base64 helpers ----------
const toB64 = (bytes) => btoa(String.fromCharCode(...bytes));
const fromB64 = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

// ---------- client-side keystore encryption (Web Crypto: PBKDF2 + AES-GCM) ----------
// The keystore holds the wallet's real secret seed. It is only ever decrypted
// into memory for the current session - never persisted in plaintext.
async function deriveKey(password, salt) {
  const keyMaterial = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

async function encryptKeystore(password, bytes) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const ciphertext = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, bytes));
  return { salt: toB64(salt), iv: toB64(iv), ciphertext: toB64(ciphertext) };
}

async function decryptKeystore(password, encrypted) {
  const salt = fromB64(encrypted.salt);
  const iv = fromB64(encrypted.iv);
  const ciphertext = fromB64(encrypted.ciphertext);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
  return new Uint8Array(plain);
}

const KEYSTORE_STORAGE_KEY = "hazeEncryptedKeystore";
const STORE_STORAGE_KEY = "hazeWalletStoreBytes";
// Set only once onboarding (mnemonic confirmed + funded + name registered)
// finishes - lets boot() resume onboarding after a reload instead of
// dropping straight into the dashboard with no name.
const ONBOARDING_STORAGE_KEY = "hazeOnboardingComplete";
// Cached copy of this wallet's own registered .haze name, purely a display
// convenience (the node's registry is the source of truth) - avoids a
// reverse-lookup scan of the whole registry on every dashboard load.
const MY_NAME_STORAGE_KEY = "hazeMyName";

function hasWallet() { return localStorage.getItem(KEYSTORE_STORAGE_KEY) !== null; }
function onboardingComplete() { return localStorage.getItem(ONBOARDING_STORAGE_KEY) === "true"; }
function loadWalletStoreBytes() {
  const b64 = localStorage.getItem(STORE_STORAGE_KEY);
  return b64 ? fromB64(b64) : wallet_store_new();
}
function saveWalletStoreBytes(bytes) {
  localStorage.setItem(STORE_STORAGE_KEY, toB64(bytes));
}
function saveMyName(name) { localStorage.setItem(MY_NAME_STORAGE_KEY, name); }
function loadMyName() { return localStorage.getItem(MY_NAME_STORAGE_KEY); }
function clearMyName() { localStorage.removeItem(MY_NAME_STORAGE_KEY); }

// ---------- unified activity/history log ----------
// A single append-only log of everything that moved funds or touched a name
// from this wallet, newest first - gives the History tab a real place to
// live instead of scattering "it worked" messages across Send/Receive/Names.
// Purely a local display record (the chain/registry are the source of
// truth for actual state); persisted so it survives a reload.
const ACTIVITY_STORAGE_KEY = "hazeActivityLog";
const MAX_ACTIVITY_ENTRIES = 50;

function loadActivity() {
  try {
    return JSON.parse(localStorage.getItem(ACTIVITY_STORAGE_KEY) || "[]");
  } catch (e) {
    return [];
  }
}
function pushActivity(entry) {
  const log = loadActivity();
  log.unshift({ ...entry, ts: Date.now() });
  log.length = Math.min(log.length, MAX_ACTIVITY_ENTRIES);
  localStorage.setItem(ACTIVITY_STORAGE_KEY, JSON.stringify(log));
  renderHistory();
}

function relativeTime(ts) {
  const seconds = Math.floor((Date.now() - ts) / 1000);
  if (seconds < 5) return "just now";
  if (seconds < 60) return `${seconds}s ago`;
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  return new Date(ts).toLocaleDateString();
}

const ACTIVITY_ICONS = {
  sent: { cls: "out", svg: '<path d="M7 17L17 7M8 7h9v9"/>' },
  received: { cls: "in", svg: '<path d="M17 7L7 17M16 17H7V8"/>' },
  faucet: { cls: "in", svg: '<path d="M12 4v12m0 0l-4-4m4 4l4-4M5 20h14"/>' },
  name_registered: { cls: "meta", svg: '<circle cx="12" cy="12" r="4"/><path d="M16 12v1.4a2.6 2.6 0 0 0 5 0V12a9 9 0 1 0-5.5 8.3"/>' },
  name_transferred: { cls: "meta", svg: '<path d="M4 12h13m0 0l-4-4m4 4l-4 4"/>' },
  validator: { cls: "meta", svg: '<path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/>' },
};

// Renders into the History tab if it's currently in the DOM - a no-op
// (harmlessly skipped) when called from other tabs, e.g. right after a
// send completes while the user is still looking at the Send tab.
function renderHistory() {
  const list = document.getElementById("history-list");
  if (!list) return;
  const log = loadActivity();
  if (log.length === 0) {
    list.innerHTML = `<div class="activity-empty">No activity yet - sends, receives, and name changes will show up here.</div>`;
    return;
  }
  list.innerHTML = log.map((entry) => {
    const icon = ACTIVITY_ICONS[entry.type] || ACTIVITY_ICONS.name_registered;
    return `
      <div class="activity-item">
        <div class="activity-icon ${icon.cls}"><svg viewBox="0 0 24 24">${icon.svg}</svg></div>
        <div class="activity-body">
          <div class="activity-title">${entry.title}</div>
          ${entry.detail ? `<div class="activity-detail">${entry.detail}</div>` : ""}
        </div>
        <div class="activity-time">${relativeTime(entry.ts)}</div>
      </div>
    `;
  }).join("");
}

function renderMyNameBadge(name) {
  const badge = document.getElementById("my-name-badge");
  if (name) {
    badge.textContent = displayName(name);
    badge.style.display = "";
  } else {
    badge.style.display = "none";
  }
  renderReceiveName(name);
}

// The Receive tab's whole job is showing this wallet's name so someone else
// can send to it - if there isn't one yet, point at the Names tab instead of
// showing an empty panel.
function renderReceiveName(name) {
  const el = document.getElementById("receive-name-display");
  if (!el) return; // dashboard not rendered yet - renderMyNameBadge runs before it in some paths
  if (name) {
    el.innerHTML = `
      <div class="receive-name-value">${displayName(name)}</div>
      <button class="btn-primary" id="receive-name-copy-btn">Copy address</button>
    `;
    document.getElementById("receive-name-copy-btn").addEventListener("click", async (e) => {
      try {
        await navigator.clipboard.writeText(displayName(name));
        e.target.textContent = "Copied!";
      } catch (err) {
        e.target.textContent = displayName(name); // clipboard blocked - show it so it can be selected/copied by hand
      }
      setTimeout(() => { e.target.textContent = "Copy address"; }, 1500);
    });
  } else {
    el.innerHTML = `<div class="message error">You haven't claimed a name yet - head to the Names tab to get one, it's free.</div>`;
  }
}

// Resolves this wallet's own .haze name for display: trusts the cached name
// if present, otherwise falls back to scanning the registry once for a
// record owned by this wallet's identity pubkey (covers names registered
// before this cache existed, or a fresh browser profile restored from a
// mnemonic). Best-effort - failures just leave the badge hidden.
async function resolveMyName() {
  const cached = loadMyName();
  if (cached) { renderMyNameBadge(cached); return; }
  renderMyNameBadge(null); // shows the Receive tab's "claim a name" prompt while resolving
  try {
    const pubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
    const records = await fetchJson("/v1/names?limit=500");
    const mine = records.find(r => bytesToHex(r.owner_pubkey) === pubkeyHex);
    if (mine) {
      saveMyName(mine.name);
      renderMyNameBadge(mine.name);
    }
  } catch (e) {
    // non-fatal, just leave the badge hidden
  }
}

// In-memory only for this session - never written back to localStorage in plaintext.
let sessionKeystoreBytes = null;

// ---------- "Send to a name" (inbox-relayed slate exchange) ----------
// Only one in-flight "send to a name" at a time - starting a second before
// the first completes would orphan its change output.
let pendingNameSend = null; // { toName, pendingSlateBytes, amount }

async function fetchJson(path, opts) {
  const res = await fetch(API_BASE + path, opts);
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

// Matches core::mempool::MIN_FEE - only used if the node can't be reached
// for a live estimate, so a transaction can still be built offline-ish
// rather than blocking entirely on one extra request.
const FALLBACK_FEE = 5n;

// Fees are congestion-priced (see core::mempool::suggested_fee /
// GET /v1/fee-estimate) rather than a flat constant - the network gets to
// say what it actually costs to get into the next block right now, instead
// of every wallet guessing the same hardcoded number regardless of traffic.
async function getSuggestedFee() {
  try {
    const estimate = await fetchJson("/v1/fee-estimate");
    return BigInt(estimate.suggested_fee);
  } catch (e) {
    return FALLBACK_FEE;
  }
}

// Matches core::registry::NAME_REGISTRATION_FEE - the hard consensus floor,
// used as a fallback if the node can't be reached for a live estimate.
const FALLBACK_NAME_FEE = 5n;

// Congestion-priced the same way as getSuggestedFee, just against the
// name-registration backlog instead of the payment one (see
// Mempool::suggested_name_fee / GET /v1/fee-estimate's suggested_name_fee).
async function getSuggestedNameFee() {
  try {
    const estimate = await fetchJson("/v1/fee-estimate");
    return BigInt(estimate.suggested_name_fee);
  } catch (e) {
    return FALLBACK_NAME_FEE;
  }
}

function renderLockScreen() {
  const app = document.getElementById("app");
  const exists = hasWallet();

  app.innerHTML = `
    <div class="panel">
      <h2>${exists ? "Unlock Wallet" : "Create Wallet"}</h2>
      <div class="sub">${exists
        ? "Enter your password to unlock the wallet stored in this browser."
        : "Generates a real keystore (via the browser's secure RNG) and encrypts it with your password before storing it in this browser."}</div>
      <label>Password</label>
      <input type="password" id="pw-input" autocomplete="${exists ? "current-password" : "new-password"}" />
      ${exists ? "" : `<label>Confirm password</label><input type="password" id="pw-confirm-input" autocomplete="new-password" />`}
      <button class="btn-primary" id="submit-btn">${exists ? "Unlock" : "Create Wallet"}</button>
      <div id="lock-message"></div>
      ${exists
        ? `<span class="toggle-link" id="reset-link">Wrong browser / start fresh instead?</span>`
        : `<span class="toggle-link" id="restore-link">Already have a recovery phrase? Restore it</span>`}
    </div>
  `;

  const message = (text, cls) => {
    document.getElementById("lock-message").innerHTML = `<div class="message ${cls}">${text}</div>`;
  };

  document.getElementById("submit-btn").addEventListener("click", async () => {
    const password = document.getElementById("pw-input").value;
    if (!password) { message("Enter a password.", "error"); return; }

    if (exists) {
      try {
        const encrypted = JSON.parse(localStorage.getItem(KEYSTORE_STORAGE_KEY));
        sessionKeystoreBytes = await decryptKeystore(password, encrypted);
        if (onboardingComplete()) {
          renderDashboard();
        } else {
          // Unlocked, but never finished picking a name (e.g. reloaded
          // mid-onboarding) - the phrase was only ever shown once and can't
          // be re-shown, so just resume at naming.
          renderNameStep();
        }
      } catch (e) {
        message("Incorrect password.", "error");
      }
    } else {
      const confirm = document.getElementById("pw-confirm-input").value;
      if (password !== confirm) { message("Passwords don't match.", "error"); return; }
      if (password.length < 8) { message("Use at least 8 characters.", "error"); return; }

      const generated = generate_keystore_with_mnemonic();
      const encrypted = await encryptKeystore(password, generated.keystore_bytes);
      localStorage.setItem(KEYSTORE_STORAGE_KEY, JSON.stringify(encrypted));
      saveWalletStoreBytes(wallet_store_new());
      sessionKeystoreBytes = generated.keystore_bytes;
      renderMnemonicStep(generated.mnemonic);
    }
  });

  const resetLink = document.getElementById("reset-link");
  if (resetLink) {
    resetLink.addEventListener("click", () => {
      if (window.confirm("This deletes the wallet stored in this browser. This cannot be undone. Continue?")) {
        localStorage.removeItem(KEYSTORE_STORAGE_KEY);
        localStorage.removeItem(STORE_STORAGE_KEY);
        localStorage.removeItem(ONBOARDING_STORAGE_KEY);
        localStorage.removeItem(ACTIVITY_STORAGE_KEY);
        clearMyName();
        renderLockScreen();
      }
    });
  }

  const restoreLink = document.getElementById("restore-link");
  if (restoreLink) {
    restoreLink.addEventListener("click", () => renderRestoreScreen());
  }
}

  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="panel">

    </div>
  `;

  document.getElementById("restore-back-link").addEventListener("click", () => renderLockScreen());

  document.getElementById("restore-btn").addEventListener("click", async () => {
    const phrase = document.getElementById("restore-phrase-input").value.trim();
    const password = document.getElementById("restore-pw-input").value;
    const confirm = document.getElementById("restore-pw-confirm-input").value;
    const messageEl = document.getElementById("restore-message");

    if (!phrase) {
      messageEl.innerHTML = `<div class="message error">Enter your recovery phrase.</div>`;
      return;
    }
    if (password !== confirm) {
      messageEl.innerHTML = `<div class="message error">Passwords don't match.</div>`;
      return;
    }
    if (password.length < 8) {
      messageEl.innerHTML = `<div class="message error">Use at least 8 characters.</div>`;
      return;
    }

    let keystoreBytes;
    try {
      keystoreBytes = restore_keystore_from_mnemonic(phrase);
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">That doesn't look like a valid recovery phrase.</div>`;
      return;
    }

    messageEl.innerHTML = `<div class="message success">Scanning the chain for your outputs&hellip;</div>`;

    try {
      const [scanRes, utxos] = await Promise.all([
        fetch(API_BASE + "/v1/scan-outputs"),
        fetchJson("/v1/utxos"),
      ]);
      if (!scanRes.ok) throw new Error("node rejected the scan request");
      const scanEntriesJson = await scanRes.text();
      const utxoHexList = utxos.map(bytesToHex);

      const result = recover_wallet_from_chain(keystoreBytes, scanEntriesJson, utxoHexList);

      const encrypted = await encryptKeystore(password, result.keystore_bytes);
      localStorage.setItem(KEYSTORE_STORAGE_KEY, JSON.stringify(encrypted));
      localStorage.setItem(STORE_STORAGE_KEY, toB64(result.store_bytes));
      localStorage.setItem(ONBOARDING_STORAGE_KEY, "true");
      sessionKeystoreBytes = result.keystore_bytes;

      messageEl.innerHTML = `<div class="message success">Recovered ${result.recovered_count} output(s) totaling ${result.recovered_balance}.</div>`;
      renderDashboard();
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });
}

async function refreshBalance() {

    const hexList = utxos.map(bytesToHex);
    let storeBytes = loadWalletStoreBytes();
    storeBytes = reconcile_wallet_store(storeBytes, hexList);
    saveWalletStoreBytes(storeBytes);

    const confirmed = wallet_balance(storeBytes);
    const pending = wallet_pending_balance(storeBytes);

    document.getElementById("stat-pending").textContent = pending.toString();
    renderNodeIndicator(true);
  } catch (e) {
    renderNodeIndicator(false);
  }

function bytesToHex(byteArray) {
  return byteArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// Links straight to the broadcast tx's kernel in the node's embedded
// explorer (served at the node's own root), instead of leaving the user
// with just a "broadcast successfully" message and no way to see it.
function explorerLinkForTx(transactionJson) {
  const tx = JSON.parse(transactionJson);
  const excessHex = bytesToHex(tx.kernels[0].excess);
  return `${API_BASE}/?q=${excessHex}`;
}

// A RegisterNameOp's "transaction" is its fee_payment sub-transaction - same
// idea as explorerLinkForTx, just one level deeper into the op JSON.
function explorerLinkForNameOp(opJson) {
  const op = JSON.parse(opJson);
  const excessHex = bytesToHex(op.fee_payment.kernels[0].excess);
  return `${API_BASE}/?q=${excessHex}`;
}

// Haze names are displayed with a ".haze" suffix (like ENS's ".eth") - purely
// cosmetic, the on-chain name itself has no dot (dots aren't in the allowed
// character set for the underlying registry).
function displayName(name) {
  return `${name}.haze`;
}

// Requires the ".haze" suffix on input (not just the bare name) so a typo'd
// or copy-pasted raw pubkey/other-chain address can't be mistaken for a
// Haze name - returns the bare on-chain name, or null if the suffix is
// missing/malformed.
function parseHazeAddress(input) {
  const trimmed = input.trim().toLowerCase();
  if (!trimmed.endsWith(".haze")) return null;
  const bare = trimmed.slice(0, -".haze".length);
  return bare.length > 0 ? bare : null;
}

// Polls GET /v1/names/:name until it's actually mined (registered_at_block
// present), instead of leaving a static "queued" message forever - blocks
// take real time here (~1s), same as every other action in this wallet, but
// there's no reason not to surface confirmation the moment it lands.
async function pollForNameConfirmation(name, onConfirmed, { intervalMs = 3000, timeoutMs = 90000, isConfirmed = () => true } = {}) {
  const start = Date.now();
  while (Date.now() - start < timeoutMs) {
    await new Promise(r => setTimeout(r, intervalMs));
    try {
      const res = await fetch(API_BASE + "/v1/names/" + encodeURIComponent(name));
      if (res.ok) {
        const record = await res.json();
        if (isConfirmed(record)) {
          onConfirmed(record);
          return;
        }
      }
    } catch (e) {
      // keep polling - a transient fetch failure shouldn't abort confirmation
    }
  }
}

  });

  document.getElementById("stake-btn").addEventListener("click", async () => {
    const minValue = BigInt(document.getElementById("stake-min").value || "1");
    const messageEl = document.getElementById("stake-message");

    try {
      const storeBytes = loadWalletStoreBytes();
      const requestJson = build_stake_request(sessionKeystoreBytes, storeBytes, minValue);

      const res = await fetch(API_BASE + "/v1/stake", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: requestJson,
      });

      if (!res.ok) {
        const text = await res.text();
        messageEl.innerHTML = `<div class="message error">Node rejected stake: ${text}</div>`;
        return;
      }

      messageEl.innerHTML = `<div class="message success">Registered as a validator. It'll show up in the explorer's validator count. It won't actually propose blocks until you run a node with its key - see below.</div>`;
      pushActivity({ type: "validator", title: "Registered as a validator" });
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  document.getElementById("reveal-key-link").addEventListener("click", () => {
    const minValue = BigInt(document.getElementById("stake-min").value || "1");
    const messageEl = document.getElementById("stake-message");
    try {
      const storeBytes = loadWalletStoreBytes();
      const hex = reveal_stake_blinding_hex(sessionKeystoreBytes, storeBytes, minValue);
      document.getElementById("reveal-key-text").value = hex;
      document.getElementById("reveal-key-output").style.display = "";
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  // Block rewards are now recoverable (see wallet::note::coinbase_blinding) -
  // this derives the same staking key reveal-key-link shows, uses it to scan
  // for and sweep every unspent reward this wallet's validator identity has
  // earned into a normal, spendable output in this same wallet.
  document.getElementById("sweep-rewards-btn").addEventListener("click", async () => {
    const messageEl = document.getElementById("sweep-rewards-message");
    const btn = document.getElementById("sweep-rewards-btn");
    btn.disabled = true;
    messageEl.innerHTML = `<div class="message success">Scanning the chain for unswept rewards&hellip;</div>`;

    try {
      const storeBytes = loadWalletStoreBytes();
      const stakeKeyHex = reveal_stake_blinding_hex(sessionKeystoreBytes, storeBytes, 1n);

      const [scanRes, utxos, fee] = await Promise.all([
        fetch(API_BASE + "/v1/scan-outputs"),
        fetchJson("/v1/utxos"),
        getSuggestedFee(),
      ]);
      if (!scanRes.ok) throw new Error("node rejected the scan request");
      const scanEntriesJson = await scanRes.text();
      const utxoHexList = utxos.map(bytesToHex);

      const result = sweep_validator_rewards(stakeKeyHex, scanEntriesJson, utxoHexList, sessionKeystoreBytes, fee);

      const res = await fetch(API_BASE + "/v1/transactions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: result.transaction_json,
      });
      if (!res.ok) {
        const text = await res.text();
        messageEl.innerHTML = `<div class="message error">Node rejected transaction: ${text}</div>`;
        return;
      }

      sessionKeystoreBytes = result.updated_keystore_bytes;
      const updatedStoreBytes = commit_send(storeBytes, [], result.dest, null);
      saveWalletStoreBytes(updatedStoreBytes);

      const link = explorerLinkForTx(result.transaction_json);
      messageEl.innerHTML = `<div class="message success">Recovered ${result.swept_count} reward(s) totaling ${result.swept_total}. Balance will update once mined. <a href="${link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">View on explorer &rarr;</a></div>`;
      pushActivity({ type: "received", title: `Recovered ${result.swept_total} in validator rewards`, detail: `${result.swept_count} block(s)` });
      await refreshBalance();
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    } finally {
      btn.disabled = false;
    }
  });

  // ---------- Haze Naming Registry ----------
  try {
    const pubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
    document.getElementById("identity-pubkey-note").textContent = `Your identity pubkey: ${pubkeyHex}`;
  } catch (e) {
    // non-fatal, just skip the note
  }

  document.getElementById("register-name-btn").addEventListener("click", async () => {
    const name = document.getElementById("name-input").value.trim();
    const messageEl = document.getElementById("register-name-message");
    if (!name) {
      messageEl.innerHTML = `<div class="message error">Enter a name.</div>`;
      return;
    }

    try {
      const storeBytes = loadWalletStoreBytes();
      const fee = await getSuggestedNameFee();
      const result = build_register_name_request(sessionKeystoreBytes, storeBytes, name, fee);

      const res = await fetch(API_BASE + "/v1/names/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: result.op_json,
      });

      if (!res.ok) {
        const errJson = await res.json().catch(() => ({}));
        messageEl.innerHTML = `<div class="message error">Node rejected registration: ${errJson.error || res.status}</div>`;
        return;
      }

      sessionKeystoreBytes = result.updated_keystore_bytes;
      let storeBytes2 = commit_register_name(storeBytes, result.spent_commitments_hex, result.change);
      saveWalletStoreBytes(storeBytes2);

      messageEl.innerHTML = `<div class="message success">Queued "${displayName(name)}" for registration - waiting for it to be mined&hellip;</div>`;
      document.getElementById("name-input").value = "";
      await refreshBalance();

      pollForNameConfirmation(name, (record) => {
        const link = explorerLinkForNameOp(result.op_json);
        messageEl.innerHTML = `<div class="message success">"${displayName(name)}" is registered! (block ${record.registered_at_block}) <a href="${link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">View on explorer &rarr;</a></div>`;
        saveMyName(name);
        renderMyNameBadge(name);
        pushActivity({ type: "name_registered", title: `Registered ${displayName(name)}` });
      });
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  document.getElementById("lookup-name-btn").addEventListener("click", async () => {
    const name = document.getElementById("lookup-name-input").value.trim();
    const resultEl = document.getElementById("lookup-name-result");
    if (!name) {
      resultEl.innerHTML = `<div class="message error">Enter a name to look up.</div>`;
      return;
    }

    try {
      const res = await fetch(API_BASE + "/v1/names/" + encodeURIComponent(name));
      if (!res.ok) {
        resultEl.innerHTML = `<div class="message error">"${displayName(name)}" is not registered.</div>`;
        return;
      }
      const record = await res.json();
      const resolvesHex = bytesToHex(record.resolves_to);
      resultEl.innerHTML = `<div class="message success">"${displayName(name)}" resolves to <span class="keystore-note">${resolvesHex}</span> (registered at block ${record.registered_at_block})</div>`;
    } catch (e) {
      resultEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  document.getElementById("transfer-name-btn").addEventListener("click", async () => {
    const name = document.getElementById("transfer-name-input").value.trim();
    const newOwnerHex = document.getElementById("transfer-new-owner-input").value.trim();
    const messageEl = document.getElementById("transfer-name-message");
    if (!name || !newOwnerHex) {
      messageEl.innerHTML = `<div class="message error">Enter both a name and the new owner's pubkey.</div>`;
      return;
    }

    try {
      const opJson = build_transfer_name_request(sessionKeystoreBytes, name, newOwnerHex, newOwnerHex);

      const res = await fetch(API_BASE + "/v1/names/transfer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: opJson,
      });

      if (!res.ok) {
        const errJson = await res.json().catch(() => ({}));
        messageEl.innerHTML = `<div class="message error">Node rejected transfer: ${errJson.error || res.status}</div>`;
        return;
      }

      messageEl.innerHTML = `<div class="message success">Queued transfer of "${displayName(name)}" - waiting for it to be mined&hellip;</div>`;
      document.getElementById("transfer-name-input").value = "";
      document.getElementById("transfer-new-owner-input").value = "";

      pollForNameConfirmation(name, () => {
        messageEl.innerHTML = `<div class="message success">"${displayName(name)}" transfer complete.</div>`;
        if (loadMyName() === name) {
          clearMyName();
          renderMyNameBadge(null);
        }
        pushActivity({ type: "name_transferred", title: `Transferred ${displayName(name)}`, detail: `to ${newOwnerHex}` });
      }, { isConfirmed: (record) => bytesToHex(record.owner_pubkey) === newOwnerHex.toLowerCase() });
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  // Requests funds from the node's own repeatable faucet (see src/api/faucet.rs)
  // - unlike the old single-use claim-genesis output, this can be used as many
  // times as needed, capped per request server-side. Runs the same two-party
  // slate protocol as a normal peer payment, just fully automated: the node
  // plays sender, this wallet plays receiver, both steps happen in one click.
  document.getElementById("faucet-btn").addEventListener("click", async () => {
    const messageEl = document.getElementById("dash-message");
    const btn = document.getElementById("faucet-btn");
    btn.disabled = true;
    messageEl.innerHTML = `<div class="message success">Requesting devnet funds&hellip;</div>`;

    try {
      const FAUCET_AMOUNT = 500n;
      const reqRes = await fetch(API_BASE + "/v1/faucet", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount: Number(FAUCET_AMOUNT) }),
      });
      const reqJson = await reqRes.json();
      if (!reqRes.ok) {
        messageEl.innerHTML = `<div class="message error">Faucet unavailable: ${reqJson.error || reqRes.status}</div>`;
        return;
      }

      const responded = respond_to_slate(sessionKeystoreBytes, reqJson.slate_json);
      sessionKeystoreBytes = responded.updated_keystore_bytes;
      let storeBytes = loadWalletStoreBytes();
      storeBytes = commit_receive(storeBytes, responded.receiver_output);
      saveWalletStoreBytes(storeBytes);

      const completeRes = await fetch(API_BASE + "/v1/faucet/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ response_slate_json: responded.response_slate_json }),
      });
      const completeJson = await completeRes.json();
      if (!completeRes.ok) {
        messageEl.innerHTML = `<div class="message error">Faucet failed to broadcast: ${completeJson.error || completeRes.status}</div>`;
        return;
      }

      messageEl.innerHTML = `<div class="message success">Received ${FAUCET_AMOUNT}. Refreshing balance&hellip;</div>`;
      pushActivity({ type: "faucet", title: `Received ${FAUCET_AMOUNT} from devnet faucet` });
      await refreshBalance();
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById("lock-btn").addEventListener("click", () => {
    sessionKeystoreBytes = null;
    renderMyNameBadge(null);
    renderLockScreen();
  });

  document.getElementById("send-btn").addEventListener("click", async () => {
    const amountInput = document.getElementById("send-amount");
    const amount = BigInt(amountInput.value || "0");
    const messageEl = document.getElementById("send-message");
    if (amount <= 0n) {
      messageEl.innerHTML = `<div class="message error">Enter an amount.</div>`;
      return;
    }

    try {
      const storeBytes = loadWalletStoreBytes();
      const fee = await getSuggestedFee();
      const plan = plan_send(sessionKeystoreBytes, storeBytes, amount, fee);

      const res = await fetch(API_BASE + "/v1/transactions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: plan.transaction_json,
      });

      if (!res.ok) {
        const text = await res.text();
        messageEl.innerHTML = `<div class="message error">Node rejected transaction: ${text}</div>`;
        return;
      }

      sessionKeystoreBytes = plan.updated_keystore_bytes;
      const updatedStoreBytes = commit_send(storeBytes, plan.spent_commitments_hex, plan.dest, plan.change);
      saveWalletStoreBytes(updatedStoreBytes);

      const link = explorerLinkForTx(plan.transaction_json);
      messageEl.innerHTML = `<div class="message success">Broadcast successfully. Balance will update once mined. <a href="${link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">View on explorer &rarr;</a></div>`;
      pushActivity({ type: "sent", title: `Self-pay ${amount.toString()}`, detail: "consolidated own UTXOs" });
      amountInput.value = "";
      await refreshBalance();
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  renderHistory();

  async function refreshFeeNotes() {
    const [fee, nameFee] = await Promise.all([getSuggestedFee(), getSuggestedNameFee()]);
    const text = `current fee: ${fee}`;
    ["send-fee-note", "name-send-fee-note"].forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    });
    const nameFeeEl = document.getElementById("register-name-fee-note");
    if (nameFeeEl) nameFeeEl.textContent = `current fee: ${nameFee}`;
  }
  refreshFeeNotes();

  // Live-checks the recipient as the user types (debounced) so a typo or a
  // not-yet-registered name is caught before the user even hits Send,
  // instead of only failing after building a slate. Purely advisory - the
  // Send handler below re-checks and is the actual gate.
  let nameSendLookupTimer = null;
  document.getElementById("name-send-recipient").addEventListener("input", () => {
    const statusEl = document.getElementById("name-send-lookup-status");
    const raw = document.getElementById("name-send-recipient").value;
    clearTimeout(nameSendLookupTimer);
    if (!raw.trim()) { statusEl.textContent = ""; return; }
    const bare = parseHazeAddress(raw);
    if (!bare) { statusEl.textContent = `Must end in ".haze", e.g. harshit.haze`; return; }
    statusEl.textContent = "Looking up...";
    nameSendLookupTimer = setTimeout(async () => {
      try {
        const res = await fetch(API_BASE + "/v1/names/" + encodeURIComponent(bare));
        statusEl.textContent = res.ok ? `"${displayName(bare)}" found on-chain.` : `"${displayName(bare)}" is not registered.`;
      } catch (e) {
        statusEl.textContent = "Couldn't reach the node to look this up.";
      }
    }, 400);
  });

  document.getElementById("name-send-btn").addEventListener("click", async () => {
    const rawInput = document.getElementById("name-send-recipient").value;
    const amount = BigInt(document.getElementById("name-send-amount").value || "0");
    const messageEl = document.getElementById("name-send-message");

    const toName = parseHazeAddress(rawInput);
    if (!toName) {
      messageEl.innerHTML = `<div class="message error">Enter the recipient's full name including the ".haze" suffix, e.g. harshit.haze.</div>`;
      return;
    }
    if (amount <= 0n) {
      messageEl.innerHTML = `<div class="message error">Enter an amount.</div>`;
      return;
    }
    if (pendingNameSend) {
      messageEl.innerHTML = `<div class="message error">You already have a send to "${displayName(pendingNameSend.toName)}" awaiting acceptance. Wait for it to complete first.</div>`;
      return;
    }

    try {
      const nameRes = await fetch(API_BASE + "/v1/names/" + encodeURIComponent(toName));
      if (!nameRes.ok) {
        messageEl.innerHTML = `<div class="message error">"${displayName(toName)}" is not registered.</div>`;
        return;
      }
      const record = await nameRes.json();
      const toPubkeyHex = bytesToHex(record.resolves_to);

      const storeBytes = loadWalletStoreBytes();
      const fee = await getSuggestedFee();
      const slate = create_send_slate(sessionKeystoreBytes, storeBytes, amount, fee);
      sessionKeystoreBytes = slate.updated_keystore_bytes;

      const myPubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
      const inboxRes = await fetch(API_BASE + "/v1/inbox/" + toPubkeyHex, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ from_pubkey_hex: myPubkeyHex, kind: "request", payload_json: slate.slate_json }),
      });
      if (!inboxRes.ok) {
        messageEl.innerHTML = `<div class="message error">Failed to deliver payment request.</div>`;
        return;
      }

      pendingNameSend = { toName, pendingSlateBytes: slate.pending_slate_bytes, amount: amount.toString() };
      messageEl.innerHTML = `<div class="message success">Sent to "${displayName(toName)}" - waiting for them to accept&hellip;</div>`;
      document.getElementById("name-send-recipient").value = "";
      document.getElementById("name-send-amount").value = "";
    } catch (e) {
      messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
    }
  });

  // Crypto-necessary step, not a user decision: the receiver still has to
  // locally compute their output's blinding factor and send back a partial
  // signature (that's what makes it a two-party Mimblewimble payment rather
  // than an account balance the sender could just edit) - but there's no
  // reason a person needs to click a button to make that happen. The wallet
  // does it the instant it sees the request during its normal inbox poll.
  async function autoAcceptIncomingRequest(msg) {
    const responded = respond_to_slate(sessionKeystoreBytes, msg.payload_json);
    sessionKeystoreBytes = responded.updated_keystore_bytes;

    let storeBytes = loadWalletStoreBytes();
    storeBytes = commit_receive(storeBytes, responded.receiver_output);
    saveWalletStoreBytes(storeBytes);

    await fetch(API_BASE + "/v1/inbox/" + msg.from_pubkey_hex, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ from_pubkey_hex: wallet_identity_pubkey_hex(sessionKeystoreBytes), kind: "response", payload_json: responded.response_slate_json }),
    });

    pushActivity({
      type: "received",
      title: `Received ${responded.receiver_output.value.toString()}`,
      detail: `from ${msg.from_pubkey_hex}`,
    });
  }

  async function pollInbox() {
    try {
      const myPubkeyHex = wallet_identity_pubkey_hex(sessionKeystoreBytes);
      const res = await fetch(API_BASE + "/v1/inbox/" + myPubkeyHex);
      if (!res.ok) return;
      const messages = await res.json();

      for (const msg of messages) {
        if (msg.kind === "response" && pendingNameSend) {
          const messageEl = document.getElementById("name-send-message");
          try {
            const finalized = finalize_slate(pendingNameSend.pendingSlateBytes, msg.payload_json);
            const res2 = await fetch(API_BASE + "/v1/transactions", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: finalized.transaction_json,
            });
            if (!res2.ok) {
              const text = await res2.text();
              messageEl.innerHTML = `<div class="message error">Node rejected transaction: ${text}</div>`;
              pendingNameSend = null;
              continue;
            }
            let storeBytes = loadWalletStoreBytes();
            storeBytes = commit_slate_send(storeBytes, finalized.spent_commitments_hex, finalized.change);
            saveWalletStoreBytes(storeBytes);

            const link = explorerLinkForTx(finalized.transaction_json);
            messageEl.innerHTML = `<div class="message success">"${displayName(pendingNameSend.toName)}" accepted - broadcast successfully. <a href="${link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">View on explorer &rarr;</a></div>`;
            pushActivity({ type: "sent", title: `Sent ${pendingNameSend.amount}`, detail: `to ${displayName(pendingNameSend.toName)}` });
            pendingNameSend = null;
            await refreshBalance();
          } catch (e) {
            messageEl.innerHTML = `<div class="message error">${e.message || e}</div>`;
            pendingNameSend = null;
          }
        } else if (msg.kind === "request") {
          try {
            await autoAcceptIncomingRequest(msg);
          } catch (e) {
            // This message is lost (already drained from the inbox by the
            // GET above) - next poll just continues with whatever else is
            // pending, same as any other transient failure here.
          }
        }
      }
      if (messages.some(m => m.kind === "request")) {
        await refreshBalance();
      }
    } catch (e) {
      // transient - next poll will retry
    }
  }

  refreshBalance();
  resolveMyName();
  setInterval(refreshBalance, 4000);
  setInterval(pollInbox, 3000);
  setInterval(refreshFeeNotes, 8000);
}

// ---------- boot ----------
async function boot() {
  await init();
  renderNodeIndicator(false);
  renderLockScreen();
}
boot();
</script>
</body>
</html>
